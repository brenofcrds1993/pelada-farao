<!DOCTYPE html>
<html lang="pt-BR" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelada do Faraó - Ao Vivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* CONFIGURAÇÕES DE DESIGN APPLE */
        :root {
            --apple-bg: #000000;
            --apple-card: #1C1C1E;
            --apple-card-hover: #2C2C2E;
            --apple-text: #FFFFFF;
            --apple-text-muted: #8E8E93;
            --apple-border: rgba(84, 84, 86, 0.34); 
            --apple-blue: #0A84FF;
            --apple-gold-light: #F5D061;
            --apple-gold-dark: #B38B22;
        }

        body {
            background-color: var(--apple-bg);
            color: var(--apple-text);
            /* Font stack nativa da Apple */
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        h1, h2, h3 { letter-spacing: -0.02em; }
        
        /* Glassmorphism - Navbar e Blur */
        .glass-nav {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--apple-border);
        }

        /* Bento Grid Cards (Widgets iOS) */
        .bento-card {
            background-color: var(--apple-card);
            border-radius: 22px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 0.5px solid var(--apple-border);
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .bento-icon-wrapper {
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        /* Apple List (Estilo Ajustes do iPhone) */
        .apple-list {
            background-color: var(--apple-card);
            border-radius: 22px;
            overflow: hidden;
            border: 0.5px solid var(--apple-border);
        }

        .player-row {
            transition: background-color 0.2s;
            cursor: pointer;
        }

        .player-row:active {
            background-color: var(--apple-card-hover);
        }

        .apple-list-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
        }

        /* Linha divisória interna (não encosta na esquerda) */
        .player-row:not(:last-child) .item-content {
            border-bottom: 0.5px solid var(--apple-border);
        }

        .item-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            margin-bottom: -12px;
        }

        /* Detalhes expansíveis com animação suave */
        .player-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
            opacity: 0;
            background-color: rgba(0,0,0,0.3);
        }
        
        .player-row.active .player-details {
            max-height: 500px;
            opacity: 1;
            padding: 16px;
            border-bottom: 0.5px solid var(--apple-border);
        }
        
        /* Rotação da setinha */
        .chevron {
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .player-row.active .chevron {
            transform: rotate(90deg);
        }

        /* Pílulas de Estatísticas internas */
        .stat-pill {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 10px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 0.5px solid rgba(255,255,255,0.02);
        }

        /* Avatares */
        .avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #2C2C2E;
            margin-right: 14px;
            flex-shrink: 0;
        }

        /* Loading Skeletons */
        .shimmer {
            background: #2C2C2E;
            background-image: linear-gradient(to right, #2C2C2E 0%, #3C3C3E 20%, #2C2C2E 40%, #2C2C2E 100%);
            background-repeat: no-repeat;
            background-size: 800px 104px;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
            animation-name: placeholderShimmer;
            animation-timing-function: linear;
        }
        @keyframes placeholderShimmer {
            0% { background-position: -468px 0; }
            100% { background-position: 468px 0; }
        }
        
        /* Ocultar barra de rolagem */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-12 text-[15px]">

    <nav class="glass-nav sticky top-0 z-50 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#F5D061] to-[#B38B22] flex items-center justify-center shadow-lg">
                <i data-lucide="crown" class="w-5 h-5 text-black"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-bold text-xl leading-none tracking-tight">Faraó</span>
                <span class="text-[10px] font-semibold text-[#8E8E93] uppercase tracking-widest mt-0.5">Temporada 2026</span>
            </div>
        </div>
        <div class="flex items-center gap-2 px-3 py-1.5 bg-[#1C1C1E] rounded-full border border-[rgba(255,255,255,0.1)]">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
            <span id="status-text" class="text-xs font-semibold text-[#8E8E93]">Sincronizando</span>
        </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 mt-6 space-y-8">
        
        <div id="error-message" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 px-4 py-3 rounded-xl text-sm font-medium backdrop-blur-md"></div>

        <section>
            <h2 class="text-[22px] font-bold mb-4 tracking-tight px-1">Destaques</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="bento-grid">
                <div class="bento-card h-32 shimmer border-none"></div>
                <div class="bento-card h-32 shimmer border-none"></div>
                <div class="bento-card h-32 shimmer border-none"></div>
                <div class="bento-card h-32 shimmer border-none"></div>
            </div>
        </section>

        <section class="px-1">
            <div class="relative flex items-center w-full h-[42px] rounded-xl bg-[#1C1C1E] overflow-hidden focus-within:ring-1 focus-within:ring-[#0A84FF] transition-shadow">
                <i data-lucide="search" class="w-[18px] h-[18px] text-[#8E8E93] ml-3 absolute"></i>
                <input type="text" id="search-input" placeholder="Buscar atleta..." 
                       class="w-full h-full bg-transparent border-none text-[16px] text-white placeholder-[#8E8E93] pl-10 pr-3 focus:outline-none focus:ring-0">
            </div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-3 px-1">
                <h2 class="text-[22px] font-bold tracking-tight">Classificação Geral</h2>
            </div>
            
            <div class="apple-list" id="ranking-list">
                <div class="apple-list-item shimmer h-[72px] border-b border-gray-800/50"></div>
                <div class="apple-list-item shimmer h-[72px] border-b border-gray-800/50"></div>
                <div class="apple-list-item shimmer h-[72px]"></div>
            </div>
        </section>

    </main>

    <script>
        // Inicializa ícones lucide
        lucide.createIcons();

        // ==========================================
        // CONFIGURAÇÕES - COLE SEU LINK AQUI 👇
        // ==========================================
        const SHEET_URL = "COLE_SEU_LINK_CSV_AQUI"; 
        const CAMINHO_FOTOS = "./fotos/";
        const FORMATO_FOTO = ".jpg";
        const FOTO_GENERICA = "https://cdn-icons-png.flaticon.com/512/847/847969.png";

        let allAthletes = [];

        // Converte o nome para buscar a imagem
        function getFoto(nome) { 
            let cleanName = nome.toLowerCase().trim();
            if(cleanName === "movel") cleanName = "móvel";
            return `${CAMINHO_FOTOS}${cleanName}${FORMATO_FOTO}`; 
        }

        async function init() {
            const errorMsg = document.getElementById('error-message');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if(SHEET_URL.includes("COLE_SEU")) {
                showError("ERRO: Cole o link do CSV no código na variável SHEET_URL!");
                return;
            }

            try {
                const response = await fetch(SHEET_URL);
                const csvText = await response.text();
                
                if(csvText.trim().startsWith("<!DOCTYPE") || csvText.trim().startsWith("<html")) {
                    throw new Error("Link incorreto! Certifique-se de que é um arquivo CSV.");
                }

                processData(csvText);

                // Atualiza Status do Sistema (Verde)
                statusDot.classList.replace('bg-blue-500', 'bg-green-500');
                statusDot.classList.remove('animate-pulse');
                statusText.innerText = "Atualizado Agora";
                statusText.classList.replace('text-[#8E8E93]', 'text-green-500');

                renderDashboard();

            } catch (err) {
                showError(`Erro ao carregar dados: ${err.message}`);
                statusDot.classList.replace('bg-blue-500', 'bg-red-500');
                statusDot.classList.remove('animate-pulse');
                statusText.innerText = "Offline";
                statusText.classList.replace('text-[#8E8E93]', 'text-red-500');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.innerText = msg;
            el.classList.remove('hidden');
        }

        // LEITURA DO ARQUIVO CSV PRÉ-PROCESSADO
        function processData(csvText) {
            const rows = csvText.split('\n');
            const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());

            allAthletes = [];

            for(let i=1; i<rows.length; i++) {
                const rowStr = rows[i].trim();
                if(!rowStr) continue;
                
                // Quebra o CSV respeitando as aspas
                const row = rowStr.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(item => item.replace(/"/g, '').trim());
                if(row.length < headers.length) continue;

                // Função de captura super flexível 
                const getVal = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    if(idx === -1) return 0;
                    let val = row[idx];
                    if(!val) return 0;
                    return Number(val.replace(',', '.')) || 0; // Transforma 12,50 em 12.50
                };

                const getStr = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    return (idx !== -1 && row[idx]) ? row[idx] : "";
                };

                const nome = getStr('atleta');
                if(!nome) continue;
                
                // Ignora goleiros no rank principal caso existam (opcional)
                const posicao = getStr('posi');
                if(posicao.toLowerCase().includes('gol')) continue;

                // Mapeia DIRETAMENTE as colunas do seu Excel processado
                allAthletes.push({
                    nome: nome,
                    posicao: posicao,
                    gols: getVal('gols'),
                    assis: getVal('assist'),
                    craque: getVal('craque da rodada'),
                    timeRodada: getVal('time da rodada'),
                    totalPts: getVal('pontuação total'),
                    partidas: getVal('quantidade partidas'),
                    cartoes: getVal('cartões'),
                    cleanSheet: getVal('clean_sheet')
                });
            }

            // Ordena unicamente pela sua coluna 'Pontuação Total' (do maior pro menor)
            allAthletes.sort((a, b) => b.totalPts - a.totalPts);
        }

        function createBentoCard(title, value, subtitle, icon, colorClass, borderClass) {
            return `
                <div class="bento-card">
                    <div>
                        <div class="bento-icon-wrapper">
                            <i data-lucide="${icon}" class="w-[18px] h-[18px] ${colorClass}"></i>
                        </div>
                        <h3 class="text-[13px] font-medium text-[#8E8E93] leading-tight">${title}</h3>
                    </div>
                    <div class="mt-3">
                        <div class="text-[26px] font-bold tracking-tight text-white leading-none mb-1">${value}</div>
                        <div class="text-[12px] font-semibold ${colorClass} truncate bg-[${borderClass}]/10 inline-block px-2 py-0.5 rounded">${subtitle}</div>
                    </div>
                </div>
            `;
        }

        function renderDashboard() {
            // Separa os tops para os Cards superiores
            const topGols = [...allAthletes].sort((a,b) => b.gols - a.gols)[0];
            const topAssis = [...allAthletes].sort((a,b) => b.assis - a.assis)[0];
            const topCraque = [...allAthletes].sort((a,b) => b.craque - a.craque)[0];
            const topTime = [...allAthletes].sort((a,b) => b.timeRodada - a.timeRodada)[0];

            document.getElementById('bento-grid').innerHTML = `
                ${createBentoCard('Artilharia', topGols ? topGols.gols : 0, topGols ? topGols.nome : '-', 'target', 'text-red-400')}
                ${createBentoCard('Assistências', topAssis ? topAssis.assis : 0, topAssis ? topAssis.nome : '-', 'footprints', 'text-blue-400')}
                ${createBentoCard('Craque', topCraque ? topCraque.craque : 0, topCraque ? topCraque.nome : '-', 'star', 'text-yellow-400')}
                ${createBentoCard('Presença', topTime ? topTime.timeRodada : 0, topTime ? topTime.nome : '-', 'shield-check', 'text-green-400')}
            `;

            renderList();
        }

        // Lógica de sanfona (iOS Expansion)
        function toggleRow(element) {
            document.querySelectorAll('.player-row.active').forEach(row => {
                if(row !== element) row.classList.remove('active');
            });
            element.classList.toggle('active');
        }

        function renderList(searchTerm = "") {
            let filtered = allAthletes;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(p => p.nome.toLowerCase().includes(term) || p.posicao.toLowerCase().includes(term));
            }

            const imgError = "this.onerror=null; this.src='" + FOTO_GENERICA + "';";

            const html = filtered.map((p, i) => {
                
                // Posições e Cores do Rank (Ouro, Prata, Bronze, Padrão)
                let rankClass = "text-[#8E8E93] font-semibold";
                if(i === 0) rankClass = "text-[#F5D061] font-bold text-[18px]"; 
                else if(i === 1) rankClass = "text-[#E5E5EA] font-bold text-[17px]"; 
                else if(i === 2) rankClass = "text-[#CD7F32] font-bold text-[17px]"; 

                return `
                <div class="player-row" onclick="toggleRow(this)">
                    
                    <div class="apple-list-item">
                        <div class="w-8 text-center text-[15px] ${rankClass} shrink-0 mr-2">${i+1}</div>
                        
                        <img src="${getFoto(p.nome)}" class="avatar border border-gray-700/50" onerror="${imgError}" alt="${p.nome}">
                        
                        <div class="item-content py-3 border-b border-gray-800/60">
                            <div class="flex flex-col justify-center">
                                <span class="font-semibold text-white text-[16px] tracking-tight leading-tight">${p.nome}</span>
                                <span class="text-[11px] text-[#8E8E93] font-semibold mt-0.5 uppercase tracking-wider">${p.posicao}</span>
                            </div>
                            
                            <div class="flex items-center gap-3">
                                <div class="text-right">
                                    <span class="font-bold text-[18px] text-white tracking-tight">${p.totalPts}</span>
                                    <span class="text-[11px] text-[#8E8E93] font-semibold">pts</span>
                                </div>
                                <i data-lucide="chevron-right" class="chevron w-4 h-4 text-[#8E8E93]"></i>
                            </div>
                        </div>
                    </div>

                    <div class="player-details">
                        <div class="grid grid-cols-4 gap-2 mb-3">
                            <div class="stat-pill">
                                <span class="text-[10px] text-[#8E8E93] font-semibold uppercase tracking-wider mb-0.5">Partidas</span>
                                <span class="text-[17px] font-bold text-white tracking-tight">${p.partidas}</span>
                            </div>
                            <div class="stat-pill">
                                <span class="text-[10px] text-[#8E8E93] font-semibold uppercase tracking-wider mb-0.5">Gols</span>
                                <span class="text-[17px] font-bold text-white tracking-tight">${p.gols}</span>
                            </div>
                            <div class="stat-pill">
                                <span class="text-[10px] text-[#8E8E93] font-semibold uppercase tracking-wider mb-0.5">Assist</span>
                                <span class="text-[17px] font-bold text-white tracking-tight">${p.assis}</span>
                            </div>
                            <div class="stat-pill">
                                <span class="text-[10px] text-[#8E8E93] font-semibold uppercase tracking-wider mb-0.5">SG</span>
                                <span class="text-[17px] font-bold text-blue-400 tracking-tight">${p.cleanSheet}</span>
                            </div>
                        </div>
                        
                        <div class="flex gap-2 flex-wrap">
                            ${p.craque > 0 ? `<div class="bg-yellow-500/10 text-yellow-500 text-[11px] px-2.5 py-1 rounded-full font-semibold border border-yellow-500/20 flex items-center gap-1"><i data-lucide="star" class="w-3 h-3"></i> Craque (${p.craque}x)</div>` : ''}
                            ${p.timeRodada > 0 ? `<div class="bg-green-500/10 text-green-500 text-[11px] px-2.5 py-1 rounded-full font-semibold border border-green-500/20 flex items-center gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i> Seleção (${p.timeRodada}x)</div>` : ''}
                            ${p.cartoes > 0 ? `<div class="bg-red-500/10 text-red-500 text-[11px] px-2.5 py-1 rounded-full font-semibold border border-red-500/20 flex items-center gap-1"><i data-lucide="square" class="w-3 h-3 bg-red-500 text-red-500 rounded-[2px]"></i> Cartões (${p.cartoes}x)</div>` : ''}
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            const container = document.getElementById('ranking-list');
            if(filtered.length > 0) {
                container.innerHTML = html;
                lucide.createIcons(); 
            } else {
                container.innerHTML = `<div class="p-8 text-center text-[#8E8E93] font-medium text-[15px]">Nenhum atleta encontrado.</div>`;
            }
        }

        // Pesquisa Dinâmica
        document.getElementById('search-input').addEventListener('input', (e) => {
            renderList(e.target.value);
        });

        // Executar
        init();
    </script>
</body>
</html>
