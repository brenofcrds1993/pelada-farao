<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutBalance - V7.1 Final</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
            --border: #334155;
            --coringa-color: #fbbf24;
            --danger: #ef4444;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; font-weight: 800; }
        .badge { background: var(--accent); color: #0f172a; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; vertical-align: middle; }

        .input-section { background: var(--card-bg); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: var(--text-sec); }
        
        textarea {
            width: 100%; height: 150px; background: #0f172a; border: 1px solid var(--border);
            color: white; padding: 15px; border-radius: 8px; font-size: 14px; resize: vertical; font-family: monospace;
        }
        textarea:focus { outline: 2px solid var(--accent); border-color: transparent; }

        .status-bar { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.85rem; color: var(--text-sec); }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }

        button {
            flex: 1; padding: 14px; border: none; border-radius: 8px; font-weight: bold;
            cursor: pointer; transition: all 0.2s; font-size: 1rem; text-transform: uppercase; letter-spacing: 0.5px;
        }
        button:active { transform: scale(0.98); }
        .btn-primary { background: var(--accent); color: #0f172a; }
        .btn-primary:hover { background: var(--accent-hover); box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }
        .btn-outline { background: transparent; border: 1px solid var(--text-sec); color: var(--text-sec); }
        .btn-outline:hover { border-color: var(--text-main); color: var(--text-main); }

        /* Grid */
        .teams-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-top: 30px; display: none; }

        .team-card {
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            border: 1px solid var(--border); display: flex; flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .team-header { background: #1e293b; padding: 15px; border-bottom: 1px solid var(--border); text-align: center; position: relative; }
        .team-name { font-weight: 800; color: var(--accent); display: block; font-size: 1.2rem; }
        .team-stats { font-size: 0.85rem; color: var(--text-sec); margin-top: 5px; }

        .player-count-badge {
            background: #334155; color: #fff; font-size: 0.7rem; padding: 3px 8px;
            border-radius: 12px; margin-top: 8px; display: inline-block; font-weight: 600;
        }
        .count-ok { color: var(--success); background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }
        .count-error { background: var(--danger); color: white; }

        .player-list { list-style: none; padding: 0; flex-grow: 1; }
        .player-item {
            display: flex; justify-content: space-between; padding: 12px 15px;
            border-bottom: 1px solid #334155; align-items: center; font-size: 0.95rem;
        }
        .player-item:last-child { border-bottom: none; }
        
        .player-info { display: flex; flex-direction: column; }
        .p-name { font-weight: 600; color: #e2e8f0; }
        .p-pos { font-size: 0.7rem; color: var(--text-sec); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        
        .p-level { 
            background: #0f172a; padding: 4px 10px; border-radius: 6px; 
            font-size: 0.85rem; min-width: 35px; text-align: center; font-weight: bold; color: var(--accent);
            border: 1px solid var(--border);
        }

        .is-coringa { background: rgba(251, 191, 36, 0.05); border-left: 3px solid var(--coringa-color); }
        .is-coringa .p-name { color: var(--coringa-color); }

        .actions-area { margin-top: 30px; display: none; gap: 10px; }
        .global-stats { margin-top: 20px; text-align: center; font-size: 0.9rem; color: var(--text-sec); display: none; background: #1e293b; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
        
        .change-indicator {
            color: var(--success); font-weight: bold; margin-left: 10px;
        }
        .loading { opacity: 0.5; pointer-events: none; cursor: wait; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>⚽ Sorteio dos times <span class="badge">Pelada do Faraó</span></h1>
    </header>

    <div class="input-section">
        <label>Cole a lista (Nome, Nível 1-8, Posição)</label>
        <textarea id="inputList" placeholder="Cole sua lista aqui..."></textarea>
        <div class="status-bar">
            <span id="playerCount">0 jogadores</span>
            <span id="teamsPrediction">--</span>
        </div>
        <div class="btn-group">
            <button class="btn-primary" id="btnSortear" onclick="iniciarProcesso()">⚡ Sortear Times</button>
            <button class="btn-outline" onclick="limpar()">Limpar</button>
        </div>
    </div>

    <div id="globalStats" class="global-stats"></div>
    <div id="teamsGrid" class="teams-grid"></div>

    <div id="actionsArea" class="actions-area">
        <button class="btn-primary" onclick="copiarWhatsApp()">📱 Copiar Todos</button>
        <button class="btn-outline" id="btnRefazer" onclick="iniciarProcesso(true)">🎲 Refazer (Novo Sorteio)</button>
    </div>
</div>

<script>
    const PLAYERS_PER_TEAM = 5;
    const MAX_RETRIES_VARIETY = 100;
    
    const POSITIONS_MAP = {
        'goleiro': 'GOL', 'gol': 'GOL',
        'zaga': 'ZAGA', 'zagueiro': 'ZAGA', 'defesa': 'ZAGA', 'beck': 'ZAGA',
        'meio': 'MEIO', 'meia': 'MEIO',
        'ataque': 'ATA', 'atacante': 'ATA', 'frente': 'ATA', 'pivo': 'ATA'
    };

    let lastGeneratedIds = null;
    let currentTeams = [];

    // --- UTILS ---
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
            const r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // --- INPUT ---
    document.getElementById('inputList').addEventListener('input', function(e) {
        const lines = e.target.value.trim().split('\n').filter(l => l.trim());
        const count = lines.length;
        document.getElementById('playerCount').innerText = `${count} jogadores`;
        if(count > 0) {
            const numTeams = Math.ceil(count / PLAYERS_PER_TEAM);
            document.getElementById('teamsPrediction').innerText = `Gerará ${numTeams} times`;
        }
    });

    function parsePlayers(text) {
        const lines = text.trim().split('\n');
        return lines.map(line => {
            if (!line.trim()) return null;
            const parts = line.split(/[,|-]+/).map(p => p.trim());
            if (parts.length >= 3) {
                const rawPos = parts[parts.length - 1].toLowerCase();
                const rawLevel = parts[parts.length - 2]; 
                const name = parts.slice(0, parts.length - 2).join(' ');
                let level = parseFloat(rawLevel);
                if (isNaN(level)) level = 1;
                const position = POSITIONS_MAP[rawPos] || 'MEIO';
                return { id: generateUUID(), name, level, position, isCoringa: false };
            }
            return null;
        }).filter(p => p !== null);
    }

    // --- PROCESSAMENTO ---
    async function iniciarProcesso(isRefazer = false) {
        const btn = isRefazer ? document.getElementById('btnRefazer') : document.getElementById('btnSortear');
        const originalText = btn.innerText;
        btn.innerText = "Processando...";
        btn.classList.add('loading');

        setTimeout(() => {
            try {
                executarLogica(isRefazer);
            } catch (e) {
                alert("Erro: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.classList.remove('loading');
            }
        }, 50);
    }

    function executarLogica(checkVariety) {
        const rawText = document.getElementById('inputList').value;
        let players = parsePlayers(rawText);

        if (players.length < PLAYERS_PER_TEAM) {
            alert("Mínimo de 5 jogadores necessários.");
            return;
        }

        const numTeams = Math.ceil(players.length / PLAYERS_PER_TEAM);
        const needed = (numTeams * PLAYERS_PER_TEAM) - players.length;
        for(let i=0; i<needed; i++) {
            players.push({ id: generateUUID(), name: `CORINGA ${i+1}`, level: 0, position: 'CORINGA', isCoringa: true });
        }

        let bestResult = null;
        let maxDiversityScore = -1;
        const attempts = checkVariety ? MAX_RETRIES_VARIETY : 1;
        
        for(let i=0; i < attempts; i++) {
            let pool = JSON.parse(JSON.stringify(players));
            let candidateTeams = gerarTimesComCotas(pool, numTeams);
            ajustarCoringas(candidateTeams);

            for(let k=0; k<50; k++) {
                if(!otimizarTrocas(candidateTeams)) break;
            }

            if (checkVariety && lastGeneratedIds) {
                const diversity = calcularDiversidade(candidateTeams);
                if (diversity >= 0.6) {
                    bestResult = candidateTeams;
                    maxDiversityScore = diversity;
                    break;
                }
                if (diversity > maxDiversityScore) {
                    maxDiversityScore = diversity;
                    bestResult = candidateTeams;
                }
            } else {
                bestResult = candidateTeams;
                break;
            }
        }

        currentTeams = bestResult;
        salvarEstado(currentTeams);
        renderTeams(currentTeams, maxDiversityScore);
    }

    function gerarTimesComCotas(allPlayers, numTeams) {
        let teams = [];
        for(let i=0; i<numTeams; i++) {
            teams.push({ id: i, name: obterNomeTime(i), players: [] });
        }

        let groups = { 'GOL': [], 'ZAGA': [], 'MEIO': [], 'ATA': [], 'CORINGA': [] };
        allPlayers.forEach(p => {
            if(groups[p.position]) groups[p.position].push(p);
            else groups['MEIO'].push(p);
        });

        const priorityOrder = ['GOL', 'ZAGA', 'ATA', 'MEIO', 'CORINGA'];
        
        priorityOrder.forEach(pos => {
            let playersOfPos = groups[pos];
            shuffleArray(playersOfPos);
            playersOfPos.sort((a,b) => b.level - a.level);

            let teamOrder = Array.from({length: numTeams}, (_, i) => i);
            shuffleArray(teamOrder);

            let currentIdx = 0;
            playersOfPos.forEach(p => {
                let targetTeamId = teamOrder[currentIdx % numTeams];
                let team = teams.find(t => t.id === targetTeamId);
                
                if (team.players.length < PLAYERS_PER_TEAM) {
                    team.players.push(p);
                } else {
                    let anyTeam = teams.find(t => t.players.length < PLAYERS_PER_TEAM);
                    if(anyTeam) anyTeam.players.push(p);
                }
                currentIdx++;
            });
        });

        return teams;
    }

    function otimizarTrocas(teams) {
        teams.forEach(t => t.avg = getAvg(t));
        let sorted = [...teams].sort((a,b) => b.avg - a.avg);
        let best = sorted[0];
        let worst = sorted[sorted.length - 1];

        if ((best.avg - worst.avg) < 0.1) return false;

        for(let i=0; i<best.players.length; i++) {
            for(let j=0; j<worst.players.length; j++) {
                let p1 = best.players[i];
                let p2 = worst.players[j];

                let compatible = (p1.position === p2.position) || p1.isCoringa || p2.isCoringa;
                if(!compatible) continue;

                if (p1.level <= p2.level) continue;

                let newAvgBest = (best.avg * 5 - p1.level + p2.level) / 5;
                let newAvgWorst = (worst.avg * 5 - p2.level + p1.level) / 5;
                let currentDiff = best.avg - worst.avg;
                let newDiff = Math.abs(newAvgBest - newAvgWorst);

                if (newDiff < currentDiff) {
                    best.players[i] = p2;
                    worst.players[j] = p1;
                    return true;
                }
            }
        }
        return false;
    }

    function salvarEstado(teams) {
        lastGeneratedIds = {};
        teams.forEach(t => {
            t.players.forEach(p => lastGeneratedIds[p.id] = t.id);
        });
    }

    function calcularDiversidade(newTeams) {
        if (!lastGeneratedIds) return 0;
        let totalPlayers = 0;
        let changes = 0;

        newTeams.forEach(t => {
            t.players.forEach(p => {
                totalPlayers++;
                if (lastGeneratedIds[p.id] !== undefined && lastGeneratedIds[p.id] !== t.id) {
                    changes++;
                }
            });
        });
        return totalPlayers === 0 ? 0 : (changes / totalPlayers);
    }

    function ajustarCoringas(teams) {
        let sum = 0, count = 0;
        teams.forEach(t => t.players.forEach(p => { if(!p.isCoringa){ sum+=p.level; count++; } }));
        let avg = count > 0 ? sum/count : 5;
        teams.forEach(t => t.players.forEach(p => {
            if(p.isCoringa) { p.level = parseFloat(avg.toFixed(1)); p.name = `CORINGA (${p.level})`; }
        }));
    }

    function getAvg(t) { return t.players.reduce((a,b)=>a+b.level,0) / t.players.length; }
    
    // ATUALIZADO: Nomes padronizados para A, B, C...
    function obterNomeTime(i) { 
        const n=['A','B','C','D','E','F','G','H']; 
        return 'TIME ' + (n[i]||(i+1)); 
    }

    // --- RENDER ---
    function renderTeams(teams, diversityScore) {
        const grid = document.getElementById('teamsGrid');
        grid.innerHTML = '';
        grid.style.display = 'grid';

        const statsDiv = document.getElementById('globalStats');
        statsDiv.style.display = 'block';
        
        let statsHTML = '';
        const allAvgs = teams.map(t => getAvg(t));
        const diff = Math.max(...allAvgs) - Math.min(...allAvgs);
        
        statsHTML += `Diferença de Força: <strong>${diff.toFixed(2)}</strong>`;
        
        if (diversityScore !== -1) {
            const pct = (diversityScore * 100).toFixed(0);
            statsHTML += `<span class="change-indicator">♻️ ${pct}% Modificado</span>`;
        }
        statsDiv.innerHTML = statsHTML;

        // Ordenar times por ID para exibição consistente (A, B, C...)
        teams.sort((a,b) => a.id - b.id);

        teams.forEach(team => {
            const avg = getAvg(team);
            const count = team.players.length;
            
            const order = {'GOL':1, 'ZAGA':2, 'MEIO':3, 'CORINGA':4, 'ATA':5};
            const sortedPlayers = [...team.players].sort((a,b) => order[a.position] - order[b.position]);

            let posCounts = { Z:0, M:0, A:0 };
            team.players.forEach(p => {
                if(p.position === 'ZAGA') posCounts.Z++;
                else if(p.position === 'ATA') posCounts.A++;
                else posCounts.M++;
            });

            let listHtml = '';
            sortedPlayers.forEach(p => {
                listHtml += `
                    <li class="player-item ${p.isCoringa?'is-coringa':''}">
                        <div class="player-info">
                            <span class="p-name">${p.name}</span>
                            <span class="p-pos">${p.position}</span>
                        </div>
                        <span class="p-level">${p.level.toFixed(2).replace(/[.,]00$/,'')}</span>
                    </li>`;
            });

            const card = document.createElement('div');
            card.className = 'team-card';
            card.innerHTML = `
                <div class="team-header">
                    <span class="team-name">${team.name}</span>
                    <div class="team-stats">Força: ${avg.toFixed(2)} | Z:${posCounts.Z} M:${posCounts.M} A:${posCounts.A}</div>
                    <div class="player-count-badge ${count===5?'count-ok':'count-error'}">${count} Atletas</div>
                </div>
                <ul class="player-list">${listHtml}</ul>
            `;
            grid.appendChild(card);
        });

        document.getElementById('actionsArea').style.display = 'flex';
        grid.scrollIntoView({ behavior: 'smooth' });
    }

    function limpar() {
        document.getElementById('inputList').value = '';
        document.getElementById('teamsGrid').style.display = 'none';
        document.getElementById('actionsArea').style.display = 'none';
        document.getElementById('globalStats').style.display = 'none';
        document.getElementById('playerCount').innerText = '0 jogadores';
        lastGeneratedIds = null;
    }

    // ATUALIZADO: Exportação limpa
    function copiarWhatsApp() {
        let text = "*⚽ TIMES SORTEADOS ⚽*\n\n";
        
        // Garante ordem A, B, C...
        const sortedTeams = [...currentTeams].sort((a,b) => a.id - b.id);

        sortedTeams.forEach(t => {
            text += `*${t.name}* (Força: ${getAvg(t).toFixed(2)})\n`;
            t.players.forEach(p => {
                // APENAS NOME (Sem posição entre parênteses)
                text += `- ${p.name}\n`; 
            });
            text += "\n";
        });
        navigator.clipboard.writeText(text).then(() => alert("Copiado com sucesso!"));
    }
</script>

</body>
</html>
