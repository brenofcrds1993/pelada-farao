<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelada do Faraó v17 - Aleatório</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        farao: {
                            gold: '#FFD700',
                            black: '#1a1a1a',
                            dark: '#000000',
                            gray: '#2d2d2d'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; user-select: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .fat-finger { min-height: 48px; min-width: 48px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.2s ease-out forwards; }
        
        .pos-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: inline-block; min-width: 35px; text-align: center; }
        .pos-gol { background-color: #fbbf24; color: black; }
        .pos-zag { background-color: #3b82f6; color: white; }
        .pos-meio { background-color: #22c55e; color: white; }
        .pos-ata { background-color: #ef4444; color: white; }
        .player-coringa { color: #b45309; font-weight: 800; font-style: italic; }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 h-screen flex flex-col overflow-hidden">

    <header class="bg-farao-dark text-farao-gold p-4 flex justify-between items-center shadow-md z-10 border-b-2 border-farao-gold">
        <div>
            <h1 class="font-black text-xl tracking-tighter flex items-center gap-2 uppercase italic">
                <span class="text-2xl not-italic">👑</span> Pelada do Faraó
            </h1>
            <div class="text-[10px] text-gray-400 font-mono" id="header-date"></div>
        </div>
        <button onclick="app.exportData()" class="bg-farao-gold active:bg-yellow-500 text-black px-3 py-2 rounded font-bold text-xs flex items-center gap-2 transition-colors shadow-lg">
            <span>BAIXAR</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
        </button>
    </header>

    <main id="app-content" class="flex-1 overflow-y-auto hide-scrollbar relative pb-24">
        </main>

    <div id="toast" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-farao-black text-farao-gold border border-farao-gold px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-opacity duration-300 z-50 text-center font-bold text-sm w-max max-w-xs">
        Mensagem aqui
    </div>

    <nav class="bg-white border-t border-gray-200 grid grid-cols-4 h-16 fixed bottom-0 w-full shadow-[0_-4px_15px_-3px_rgba(0,0,0,0.1)] z-20">
        <button onclick="app.router('checkin')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 active:text-black active:bg-yellow-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Chegada</span>
        </button>
        <button onclick="app.router('teams')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 active:text-black active:bg-yellow-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Times</span>
        </button>
        <button onclick="app.router('match')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 active:text-black active:bg-yellow-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Jogar</span>
        </button>
        <button onclick="app.router('rank')" class="nav-btn flex flex-col items-center justify-center w-full h-full text-gray-400 active:text-black active:bg-yellow-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mb-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <span class="text-[9px] font-black uppercase tracking-widest">Rank</span>
        </button>
    </nav>

    <div id="event-modal" class="fixed inset-0 bg-black/90 hidden z-50 flex items-end sm:items-center justify-center backdrop-blur-sm">
        <div id="modal-content" class="bg-white w-full sm:w-96 rounded-t-3xl sm:rounded-3xl p-6 animate-fade-in border-t-4 border-farao-gold shadow-2xl max-h-[80vh] overflow-y-auto">
            </div>
    </div>

    <script>
        // --- DATABASE MENSALISTAS (v13 - Ygor, Noé, Claudeco removidos) ---
        const MENSALISTAS = [
            { name: "André Neuro", pos: "Zaga", lvl: 4 },
            { name: "Bráulio", pos: "Ataque", lvl: 4 },
            { name: "Breno", pos: "Ataque", lvl: 6 },
            { name: "Caio Vaz", pos: "Ataque", lvl: 5 },
            // { name: "Claudeco", pos: "Ataque", lvl: 1 }, // REMOVIDO
            { name: "Goiaba", pos: "Meio", lvl: 6 },
            { name: "Jackson", pos: "Zaga", lvl: 4 },
            { name: "Jojo", pos: "Meio", lvl: 4 },
            { name: "Juninho", pos: "Meio", lvl: 7 },
            { name: "Klebnaldo", pos: "Meio", lvl: 4 },
            { name: "Matheusinho", pos: "Meio", lvl: 7 },
            { name: "Móvel", pos: "Ataque", lvl: 6 },
            // { name: "Noé", pos: "Meio", lvl: 7 }, // REMOVIDO
            { name: "Pereira", pos: "Ataque", lvl: 7 },
            { name: "Peu Presida", pos: "Zaga", lvl: 4 },
            { name: "Raji", pos: "Ataque", lvl: 5 },
            { name: "Rodrigo 01", pos: "Meio", lvl: 7 },
            { name: "Sam", pos: "Zaga", lvl: 5 },
            { name: "Wilker", pos: "Meio", lvl: 7 },
            { name: "Yushin", pos: "Zaga", lvl: 5 },
            { name: "Zaca", pos: "Meio", lvl: 5 },
            { name: "Danilove", pos: "Zaga", lvl: 4 },
            // { name: "Ygor", pos: "Meio", lvl: 6 }, // REMOVIDO
            { name: "Juca", pos: "Goleiro", lvl: 8 },
            { name: "Renato", pos: "Goleiro", lvl: 8 },
            { name: "Adalton", pos: "Goleiro", lvl: 8 },
            { name: "Mara", pos: "Goleiro", lvl: 8 },
            { name: "Santos", pos: "Goleiro", lvl: 8 },
            { name: "Iagho", pos: "Goleiro", lvl: 8 }
        ].sort((a,b) => a.name.localeCompare(b.name));

        const app = {
            data: {
                metadata: { date: new Date().toLocaleDateString('pt-BR'), location: 'Arena Faraó' },
                players: [], 
                teams: [],   
                matches: [], 
                activeMatch: null, 
                settings: { playersPerTeam: 4 } // *** v14: Agora são 4 DE LINHA ***
            },
            coringas: [], 
            currentTab: 'checkin',
            scorerId: null,
            timerInterval: null,
            matchAssignment: { 
                teamAId: null,
                teamBId: null,
                coringasToAssign: [], 
                coringaMap: {},
                gk_A_Id: null,
                gk_B_Id: null
            },

            init() {
                this.loadFromStorage();
                document.getElementById('header-date').innerText = this.data.metadata.date;
                this.router(this.currentTab);
            },

            saveToStorage() {
                localStorage.setItem('peladaFaraoV16', JSON.stringify(this.data));
            },

            loadFromStorage() {
                const stored = localStorage.getItem('peladaFaraoV16');
                if (stored) {
                    this.data = JSON.parse(stored);
                }
            },

            router(tab) {
                this.currentTab = tab;
                clearInterval(this.timerInterval);
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.remove('text-black', 'border-t-4', 'border-farao-gold', 'bg-yellow-50/50');
                    btn.classList.add('text-gray-400');
                    if(btn.getAttribute('onclick').includes(tab)) {
                        btn.classList.remove('text-gray-400');
                        btn.classList.add('text-black', 'border-t-4', 'border-farao-gold', 'bg-yellow-50/50');
                    }
                });
                const content = document.getElementById('app-content');
                content.innerHTML = ''; 
                if (tab === 'checkin') this.renderCheckin(content);
                else if (tab === 'teams') this.renderTeams(content);
                else if (tab === 'match') this.renderMatch(content);
                else if (tab === 'rank') this.renderRanking(content);
            },

            showToast(msg) {
                const t = document.getElementById('toast');
                t.innerText = msg;
                t.classList.remove('opacity-0');
                setTimeout(() => t.classList.add('opacity-0'), 2500);
            },

            // --- MODULE 1: CHECK-IN (FIXED) ---
            renderCheckin(container) {
                const availableMensalistas = MENSALISTAS.filter(m => !this.data.players.some(p => p.name === m.name));
                const availableGoleiros = availableMensalistas.filter(m => m.pos === 'Goleiro');
                const availableLinha = availableMensalistas.filter(m => m.pos !== 'Goleiro');
                const sortedPlayers = [...this.data.players].sort((a,b) => b.arrival - a.arrival);
                const presentGoleiros = sortedPlayers.filter(p => p.pos === 'Goleiro');
                const presentLinha = sortedPlayers.filter(p => p.pos !== 'Goleiro');

                const renderChamadaList = (list) => {
                    if (list.length === 0) return '<span class="text-gray-400 text-sm italic">Todos presentes.</span>';
                    return list.map(m => `
                        <button onclick="app.addMensalista('${m.name}')" class="flex-shrink-0 bg-white border border-gray-300 rounded px-3 py-2 shadow-sm active:bg-farao-gold active:border-black transition-colors flex flex-col items-center min-w-[80px]">
                            <span class="font-bold text-xs leading-tight truncate max-w-[70px]">${m.name}</span>
                            <div class="mt-1 scale-75">${this.getPosBadge(m.pos)}</div>
                        </button>
                    `).join('');
                };
                
                const renderPresentList = (list) => {
                    if (list.length === 0) return '<p class="text-gray-400 text-sm italic px-2 py-4 text-center border-2 border-dashed border-gray-200 rounded-lg">Nenhum jogador aqui.</p>';
                    return list.map((p) => `
                        <div class="flex items-center justify-between bg-white pl-4 pr-2 py-3 rounded-lg shadow-sm border border-gray-200">
                            <div class="flex items-center gap-3">
                                <div>
                                    <div class="font-bold text-gray-900">${p.name}</div>
                                    <div class="flex gap-1 mt-0.5">
                                        ${this.getPosBadge(p.pos)}
                                        <span class="text-[9px] bg-gray-100 px-1 rounded border border-gray-300 font-mono pt-0.5">Nível ${p.lvl}</span>
                                        ${p.type === 'diarista' ? '<span class="text-[9px] text-gray-400 uppercase pt-0.5 pl-1">Diarista</span>' : ''}
                                    </div>
                                </div>
                            </div>
                            <button onclick="app.removePlayer(${p.id})" class="text-gray-300 hover:text-red-500 p-2">✕</button>
                        </div>
                    `).join('');
                };

                // *** CORREÇÃO v16: Adicionado padding 'p-4' aqui ***
                container.innerHTML = `
                    <div class="p-4"> 
                        <div class="bg-slate-200 p-3 shadow-inner border-b border-gray-300 rounded-lg">
                            <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-2">🧤 Goleiros Prioridade</h3>
                            <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">${renderChamadaList(availableGoleiros)}</div>
                            <h3 class="text-xs font-black text-gray-500 uppercase tracking-widest mb-2 mt-3">📋 Lista de mensalistas</h3>
                            <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">${renderChamadaList(availableLinha)}</div>
                        </div>

                        <div class="flex-1 overflow-y-auto pt-4">
                            <div class="bg-white p-4 rounded-xl shadow-sm mb-6 border-l-4 border-farao-gold">
                                <label class="block text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Diarista / Novo</label>
                                <div class="flex flex-col gap-2">
                                    <div class="flex gap-2">
                                        <input type="text" id="dia-name" placeholder="Nome..." class="flex-1 bg-gray-50 border border-gray-300 rounded px-3 h-10 font-bold">
                                        <select id="dia-lvl" class="bg-gray-50 border border-gray-300 rounded px-2 h-10 text-sm font-bold w-20">
                                            <option value="1">Nv 1</option><option value="2">Nv 2</option><option value="3">Nv 3</option><option value="4" selected>Nv 4</option><option value="5">Nv 5</option><option value="6">Nv 6</option><option value="7">Nv 7</option>
                                        </select>
                                    </div>
                                    <div class="flex gap-2">
                                        <select id="dia-pos" class="bg-gray-50 border border-gray-300 rounded px-2 h-10 text-sm font-bold flex-1">
                                            <option value="Zaga">Zaga</option><option value="Meio" selected>Meio</option><option value="Ataque">Ataque</option><option value="Goleiro">Goleiro</option>
                                        </select>
                                        <button onclick="app.addDiarista()" class="bg-farao-black text-farao-gold px-4 rounded h-10 font-black uppercase tracking-wide text-xs shadow-lg">Adicionar</button>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-6">
                                <h2 class="font-black text-lg text-farao-dark uppercase italic mb-2 px-1 flex justify-between items-center">
                                    <span>Goleiros Presentes</span><span class="bg-farao-gold text-black px-2 py-0.5 rounded text-xs">${presentGoleiros.length}</span>
                                </h2>
                                <div class="space-y-2">${renderPresentList(presentGoleiros)}</div>
                            </div>
                            <div class="mb-6">
                                <h2 class="font-black text-lg text-farao-dark uppercase italic mb-2 px-1 flex justify-between items-center">
                                    <span>Jogadores de Linha</span><span class="bg-farao-gold text-black px-2 py-0.5 rounded text-xs">${presentLinha.length}</span>
                                </h2>
                                <div class="space-y-2">${renderPresentList(presentLinha)}</div>
                            </div>
                        </div>
                    </div>
                `;
            },

            getPosBadge(pos) {
                let cls = 'bg-gray-500 text-white';
                if(pos === 'Goleiro') cls = 'pos-gol';
                if(pos === 'Zaga') cls = 'pos-zag';
                if(pos === 'Meio') cls = 'pos-meio';
                if(pos === 'Ataque') cls = 'pos-ata';
                return `<span class="pos-badge ${cls}">${pos.substring(0,3)}</span>`;
            },

            addMensalista(name) {
                const m = MENSALISTAS.find(x => x.name === name);
                if (!m) return;
                this.data.players.push({ id: Date.now(), name: m.name, pos: m.pos, lvl: m.lvl, arrival: Date.now(), type: 'mensalista' });
                this.saveToStorage();
                this.renderCheckin(document.getElementById('app-content')); 
            },

            addDiarista() {
                const name = document.getElementById('dia-name').value.trim();
                const pos = document.getElementById('dia-pos').value;
                const lvl = parseInt(document.getElementById('dia-lvl').value);
                if (!name) return;
                this.data.players.push({ id: Date.now(), name: name, pos: pos, lvl: lvl, arrival: Date.now(), type: 'diarista' });
                this.saveToStorage();
                this.renderCheckin(document.getElementById('app-content'));
            },

            removePlayer(id) {
                if(!confirm("Remover da lista?")) return;
                this.data.players = this.data.players.filter(p => p.id !== id);
                this.saveToStorage();
                this.renderCheckin(document.getElementById('app-content'));
            },

            // --- MODULE 2: TEAMS (SNAKE DRAFT v16) ---
            renderTeams(container) {
                // *** CORREÇÃO v16: Adicionado padding 'p-4' aqui ***
                container.innerHTML = `
                    <div class="max-w-md mx-auto animate-fade-in p-4 space-y-6">
                        <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-farao-gold">
                            <div class="flex items-center gap-4 justify-between mb-2">
                                <span class="text-sm font-bold text-gray-500 uppercase">Jogadores de LINHA / Time</span>
                                <div class="flex items-center gap-3 bg-gray-100 rounded-lg p-1">
                                    <button onclick="app.changeTeamSize(-1)" class="w-8 h-8 bg-white rounded font-bold text-lg shadow-sm">-</button>
                                    <span class="font-mono text-xl font-bold w-6 text-center">${this.data.settings.playersPerTeam}</span>
                                    <button onclick="app.changeTeamSize(1)" class="w-8 h-8 bg-white rounded font-bold text-lg shadow-sm">+</button>
                                </div>
                            </div>
                            <p class="text-xs text-gray-400 mb-4 text-center">Total de jogadores na linha</p>
                            <button onclick="app.generateTeamsBalanced()" class="w-full bg-farao-black text-farao-gold font-black text-lg py-4 rounded-xl shadow-lg shadow-gray-900/20 active:scale-95 transition-transform flex items-center justify-center gap-2 uppercase">
                                ⚖️ Gerar Times (Aleatório)
                            </button>
                            </div>
                        <div id="teams-list" class="space-y-4 pb-20">
                            ${this.data.teams.length === 0 ? '<p class="text-center text-gray-400 py-10">Toque no botão para gerar os times.</p>' : ''}
                            ${this.data.teams.map(team => {
                                let totalLvl = 0;
                                team.playerIds.forEach(pid => {
                                    const p = app.findPlayerById(pid); 
                                    if(p && p.pos !== 'Goleiro') totalLvl += p.lvl;
                                });
                                return `
                                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                    <div class="bg-farao-gold px-4 py-3 flex justify-between items-center">
                                        <h3 class="font-black text-black text-lg uppercase italic tracking-wide">${team.name}</h3>
                                        <span class="text-xs font-black bg-black text-farao-gold px-2 py-1 rounded border border-white/20">Força: ${totalLvl}</span>
                                    </div>
                                    <div class="p-2">
                                        <ul class="divide-y divide-gray-100">
                                            ${team.playerIds.map(pid => {
                                                const p = app.findPlayerById(pid); 
                                                return p ? `
                                                    <li class="py-2 px-2 text-gray-800 font-medium text-sm flex justify-between items-center">
                                                        <span class="${p.type === 'coringa' ? 'player-coringa' : ''}">${p.name}</span>
                                                        <div class="flex items-center gap-2">
                                                            <span class="text-[9px] text-gray-300 font-mono">Nv.${p.lvl}</span>
                                                            ${this.getPosBadge(p.pos)}
                                                        </div>
                                                    </li>
                                                ` : '';
                                            }).join('')}
                                        </ul>
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>
                `;
            },
            
            findPlayerById(id) {
                if (this.data.activeMatch && this.data.activeMatch.coringaMap && this.data.activeMatch.coringaMap[id]) {
                    const realPlayerId = this.data.activeMatch.coringaMap[id];
                    return this.data.players.find(pl => pl.id === realPlayerId);
                }
                let player = this.data.players.find(pl => pl.id === id);
                if (player) return player;
                player = this.coringas.find(c => c.id === id);
                if (player) return player;
                return undefined; 
            },

            changeTeamSize(delta) {
                let newSize = this.data.settings.playersPerTeam + delta;
                if (newSize < 3) newSize = 3; 
                this.data.settings.playersPerTeam = newSize;
                this.saveToStorage();
                this.router('teams');
            },

            // *** NOVO ALGORITMO v16: Snake Draft ***
            generateTeamsBalanced() {
                const players = [...this.data.players];
                const linhaPlayers = players.filter(p => p.pos !== 'Goleiro');
                if (linhaPlayers.length === 0) return alert('Adicione jogadores de linha primeiro.');
                
                const size = this.data.settings.playersPerTeam; 
                if (size <= 0) return alert('Tamanho do time inválido.');
                if (linhaPlayers.length < size) return alert('Jogadores de linha insuficientes.');
                
                const numTeams = Math.ceil(linhaPlayers.length / size);
                const totalSlots = numTeams * size;
                const coringasNeeded = totalSlots - linhaPlayers.length;
                
                const allLinhaPlayers = [...linhaPlayers]; 
                this.coringas = []; 
                
                if (coringasNeeded > 0) {
                    const totalLvl = linhaPlayers.reduce((sum, p) => sum + p.lvl, 0);
                    const avgLvl = linhaPlayers.length > 0 ? Math.round(totalLvl / linhaPlayers.length) : 5; 
                    for (let i = 0; i < coringasNeeded; i++) {
                        const coringa = { id: 999 + i, name: `CORINGA Nv.${avgLvl}`, pos: 'Meio', lvl: avgLvl, type: 'coringa' };
                        allLinhaPlayers.push(coringa);
                        this.coringas.push(coringa); 
                    }
                    this.showToast(`${coringasNeeded} Coringa(s) Nv.${avgLvl} adicionado(s) para completar ${numTeams} times.`);
                } else {
                    this.showToast(`${numTeams} times completos gerados.`);
                }

                const teams = Array.from({length: numTeams}, (_, i) => ({ 
                    id: i + 1, 
                    name: `Time ${i + 1}`, 
                    playerIds: [], 
                    currentStrength: 0
                }));
                
                // --- INÍCIO DO SNAKE DRAFT (COM ALEATORIEDADE) ---
                
                // 1. Agrupa por nível
                const playersByLevel = allLinhaPlayers.reduce((acc, p) => {
                    if (!acc[p.lvl]) acc[p.lvl] = [];
                    acc[p.lvl].push(p);
                    return acc;
                }, {});

                // 2. Embaralha dentro de cada nível e junta
                let sortedPlayers = [];
                Object.keys(playersByLevel)
                    .sort((a, b) => b - a) // Ordena Níveis (7, 6, 5...)
                    .forEach(lvl => {
                        const shuffledGroup = this.shuffleArray(playersByLevel[lvl]);
                        sortedPlayers.push(...shuffledGroup);
                    });

                // 3. Distribui em zigue-zague
                let teamIndex = 0;
                let direction = 1; // 1 para frente, -1 para trás

                sortedPlayers.forEach(player => {
                    teams[teamIndex].playerIds.push(player.id);
                    teams[teamIndex].currentStrength += player.lvl;
                    teamIndex += direction;

                    if (teamIndex >= numTeams) {
                        direction = -1;
                        teamIndex = numTeams - 1;
                    } else if (teamIndex < 0) {
                        direction = 1;
                        teamIndex = 0;
                    }
                });
                // --- FIM DO SNAKE DRAFT ---
                
                this.data.teams = teams.sort((a,b) => a.id - b.id);
                this.saveToStorage(); 
                this.router('teams');
            },
            
            // Helper para embaralhar array
            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            },

            startMatch() {
                const teamAId = parseInt(document.getElementById('team-a-select').value);
                const teamBId = parseInt(document.getElementById('team-b-select').value);
                if (teamAId === teamBId) return alert('Selecione times diferentes.');
                
                const teamA = this.data.teams.find(t => t.id === teamAId);
                const teamB = this.data.teams.find(t => t.id === teamBId);
                
                const coringaIds = this.coringas.map(c => c.id); 
                const coringasA = teamA.playerIds.filter(id => coringaIds.includes(id));
                const coringasB = teamB.playerIds.filter(id => coringaIds.includes(id));
                const allCoringas = [...coringasA, ...coringasB];

                this.matchAssignment = { 
                    teamAId: teamAId, 
                    teamBId: teamBId, 
                    coringasToAssign: allCoringas.sort(), 
                    coringaMap: {},
                    gk_A_Id: null,
                    gk_B_Id: null
                };

                if (allCoringas.length > 0) {
                    this.openCoringaModal();
                } else {
                    this.openGoleiroModal('A'); // Pula para alocação de Goleiro
                }
            },
            
            openCoringaModal() {
                const coringaId = this.matchAssignment.coringasToAssign[0]; 
                if (!coringaId) {
                    this.openGoleiroModal('A');
                    return;
                }
                const coringa = this.findPlayerById(coringaId);
                const coringaLvl = coringa.lvl;
                const teamA = this.data.teams.find(t => t.id === this.matchAssignment.teamAId);
                const teamB = this.data.teams.find(t => t.id === this.matchAssignment.teamBId);
                const teamCoringa = teamA.playerIds.includes(coringaId) ? teamA : teamB;
                
                const coringaIds = this.coringas.map(c => c.id);
                const realPlayerIdsInTeamA = teamA.playerIds.filter(pid => !coringaIds.includes(pid));
                const realPlayerIdsInTeamB = teamB.playerIds.filter(pid => !coringaIds.includes(pid));
                const realPlayerIdsInGame = [...realPlayerIdsInTeamA, ...realPlayerIdsInTeamB];
                
                const allAvailablePlayers = this.data.players.filter(p => !realPlayerIdsInGame.includes(p.id) && p.pos !== 'Goleiro');
                
                let filteredPlayers = allAvailablePlayers.filter(p => p.lvl === coringaLvl || p.lvl === coringaLvl - 1);

                };

            startTimer() {

                    const elapsed = Date.now() - this.data.activeMatch.startTime;
                    let remaining = matchDuration - elapsed;
                    if (remaining <= 0) { remaining = 0; timerDisplay.classList.add('text-red-500'); }
                    const mins = Math.floor(remaining / 60000);
                    const secs = Math.floor((remaining % 60000) / 1000);
                    timerDisplay.innerText = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
                };
                update();
                this.timerInterval = setInterval(update, 1000);

            startGoalFlow() {
                const m = this.data.activeMatch;
                const scorerId = this.scorerId; 
                const tA = this.data.teams.find(t => t.id === m.teamAId);
                
                let teamOfScorer, gkOfScorer;
                const teamAPlayerIds = [...tA.playerIds.map(pid => this.findPlayerById(pid).id), m.gk_A_Id];
                
                if (teamAPlayerIds.includes(scorerId)) {
                    teamOfScorer = tA;
                    gkOfScorer = this.findPlayerById(m.gk_A_Id);
                } else {
                    teamOfScorer = this.data.teams.find(t => t.id === m.teamBId);
                    gkOfScorer = this.findPlayerById(m.gk_B_Id);
                }

                const teammates = teamOfScorer.playerIds
                    .map(pid => this.findPlayerById(pid).id) 
                    .filter(realId => realId !== scorerId)
                    .map(realId => this.data.players.find(p => p.id === realId))
                    .filter(p => p); 
                
                if (gkOfScorer && gkOfScorer.id !== scorerId) {
                    teammates.push(gkOfScorer);
                }

                const modalContent = document.getElementById('modal-content');
                
                modalContent.innerHTML = `
                    <h3 class="text-xl font-black text-center mb-4 text-gray-900 uppercase italic">Quem deu o passe?</h3>
                    <div class="space-y-3">
                        <button onclick="app.registerGoal(null)" class="w-full bg-red-100 text-red-600 py-4 rounded-xl font-bold border-2 border-red-200 active:bg-red-200 uppercase tracking-wide">
                            🚫 Ninguém (Individual)
                        </button>
                        <div class="grid grid-cols-2 gap-2 max-h-[40vh] overflow-y-auto">
                            ${teammates.map(tm => `
                                <button onclick="app.registerGoal(${tm.id})" class="bg-blue-50 text-blue-800 py-3 px-2 rounded-lg font-bold border border-blue-100 active:bg-blue-600 active:text-white truncate">
                                    ${tm.name}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            },

            registerGoal(assistId) {
                const m = this.data.activeMatch;
                if (!m) return;
                const tA = this.data.teams.find(t => t.id === m.teamAId);
                const scorerRealId = this.scorerId;
                
                const teamAPlayerIds = [...tA.playerIds.map(pid => this.findPlayerById(pid).id), m.gk_A_Id];
                const isTeamA = teamAPlayerIds.includes(scorerRealId);
                
                if (isTeamA) m.scoreA++; else m.scoreB++;
                
                const scorer = this.findPlayerById(scorerRealId);
                const timeStr = Math.floor((Date.now() - m.startTime) / 1000 / 60) + "'";
                m.events.push({ jogador: scorer.name, time_id: isTeamA ? m.teamAId : m.teamBId, tipo: 'gol', tempo: timeStr });
                
                if (assistId) {
                    const assistant = this.findPlayerById(assistId);
                    m.events.push({ jogador: assistant.name, time_id: isTeamA ? m.teamAId : m.teamBId, tipo: 'assistencia', tempo: timeStr });
                }
                
                document.getElementById('event-modal').classList.add('hidden');
                this.saveToStorage();
                
                if (m.scoreA >= 2 || m.scoreB >= 2) {
                    setTimeout(() => { alert(`🏁 FIM DE JOGO!\nPlacar: ${m.scoreA} - ${m.scoreB}`); this.endMatch(); }, 300);
                } else {
                    this.renderActiveMatch(document.getElementById('app-content'));
                    this.showToast(assistId ? 'GOL + ASSISTÊNCIA!' : 'GOL REGISTRADO!');
                }
            },

            endMatch() {
                const m = this.data.activeMatch;
                if (!m) return;
                if (m.scoreA < 2 && m.scoreB < 2) { if(!confirm("Encerrar a partida atual?")) return; }
                // Adiciona o endTime ao objeto finalMatch
                const finalMatch = { ...m, endTime: Date.now(), status: 'finished', result: m.scoreA > m.scoreB ? 'Time A' : (m.scoreB > m.scoreA ? 'Time B' : 'Empate') };
                delete finalMatch.coringaMap;
                this.data.matches.push(finalMatch);
                this.data.activeMatch = null;
                this.saveToStorage();
                this.router('match');
            },

                                <table class="w-full text-sm text-center"><thead class="bg-farao-black text-farao-gold font-bold"><tr><th class="p-2">#</th><th class="text-left">Atleta</th><th>Gol</th><th>Ass</th></tr></thead><tbody>

                `;
                
                if (this.data.matches.length === 0) {
                    container.innerHTML = `<div class="p-4"><div class="text-center pt-20 px-6"><div class="text-4xl mb-4">📊</div><h3 class="text-xl font-bold text-gray-800">Sem dados</h3><div class="mt-8"><button onclick="app.clearHistory()" class="bg-red-600 active:bg-red-800 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-wider shadow-lg">Limpar Histórico de Partidas</button></div></div></div>`;
                } else {
                    container.innerHTML = content;
                }
            },
            
            getPlayerRanking() {
                const playerStats = {}; 
                this.data.matches.forEach(m => {
                    if(m.status !== 'finished') return;
                    m.events.forEach(evt => {
                        if (evt.jogador.startsWith('CORINGA')) return; 
                        if (!playerStats[evt.jogador]) playerStats[evt.jogador] = { name: evt.jogador, gols: 0, assist: 0 };
                        if (evt.tipo === 'gol') playerStats[evt.jogador].gols++;
                        if (evt.tipo === 'assistencia') playerStats[evt.jogador].assist++;
                    });
                });
                return Object.values(playerStats).filter(p => p.gols > 0 || p.assist > 0).sort((a, b) => b.gols - a.gols || b.assist - a.assist);
            },

            getTeamRanking() {
                const teamStats = {};
                this.data.teams.forEach(t => { teamStats[t.id] = { id: t.id, name: t.name, p: 0, j: 0, v: 0, sg: 0 }; });
                this.data.matches.forEach(m => {
                    if(m.status !== 'finished') return;
                    if(!teamStats[m.teamAId]) teamStats[m.teamAId] = {id: m.teamAId, name: `Time ${m.teamAId}`, p:0, j:0, v:0, sg:0};
                    if(!teamStats[m.teamBId]) teamStats[m.teamBId] = {id: m.teamBId, name: `Time ${m.teamBId}`, p:0, j:0, v:0, sg:0};
                    const tA = teamStats[m.teamAId]; const tB = teamStats[m.teamBId];
                    tA.j++; tB.j++;
                    if(m.scoreA > m.scoreB) { tA.p += 3; tA.v++; tA.sg += (m.scoreA - m.scoreB); tB.sg += (m.scoreB - m.scoreA); }
                    else if(m.scoreB > m.scoreA) { tB.p += 3; tB.v++; tB.sg += (m.scoreB - m.scoreA); tA.sg += (m.scoreA - m.scoreB); }
                    else { tA.p += 1; tB.p += 1; }
                });
                return Object.values(teamStats).sort((a, b) => b.p - a.p || b.v - a.v || b.sg - a.sg);
            },

            exportData() {
                const cleanTeams = this.data.teams.map(t => {
                    return { id: t.id, name: t.name, playerIds: t.playerIds, currentStrength: t.currentStrength }
                });
                const exportObj = { 
                    app: "Pelada do Faraó", 
                    version: "16.0", 
                    metadata: this.data.metadata, 
                    times: cleanTeams, 
                    partidas: this.data.matches, 
                    jogadores_presentes: this.data.players,
                    stats_jogadores: this.getPlayerRanking(),
                    stats_times: this.getTeamRanking()
                };
                const jsonStr = JSON.stringify(exportObj, null, 2);
                try {
                    const blob = new Blob([jsonStr], { type: "application/json" });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = `farao_v16_${new Date().toISOString().slice(0,10)}.json`;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 0);
                    this.showToast('Download Iniciado!');
                } catch (e) { alert('Erro ao gerar arquivo.'); }
            },

            clearHistory() {
                if (!confirm("Tem certeza que deseja apagar TODO o histórico de partidas? Isso irá zerar as estatísticas.")) {
                    return;
                }
                this.data.matches = [];
                this.saveToStorage();
                this.showToast('Histórico de partidas apagado.');
                
                // Atualiza a visualização atual para refletir o estado zerado
                if (this.currentTab === 'rank') {
                    this.router('rank');
                } else if (this.currentTab === 'match') {
                    this.router('match');
                }
            },
        };

        app.init();
    </script>
</body>
