<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelada do Faraó - Ranking Ao Vivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;600;700&family=Roboto:wght@400;500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CONFIGURAÇÕES VISUAIS */
        :root { --pharaoh-black: #050505; --pharaoh-gold: #FFD700; --text-white: #ffffff; }
        body { background-color: var(--pharaoh-black); color: var(--text-white); font-family: 'Roboto', sans-serif; 
               background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('https://www.transparenttextures.com/patterns/cubes.png'); }
        h1, h2, th, .font-teko { font-family: 'Teko', sans-serif; text-transform: uppercase; }
        .text-gold { color: var(--pharaoh-gold); }
        .bg-gold { background-color: var(--pharaoh-gold); color: black; }
        
        .card-panel { background: linear-gradient(145deg, #0f0f0f, #0a0a0a); border: 1px solid #222; border-top: 3px solid var(--pharaoh-gold); transition: transform 0.3s ease; }
        .card-panel:hover { transform: translateY(-5px); border-color: var(--pharaoh-gold); }
        
        /* Loader */
        .loader { border: 3px solid #333; border-top: 3px solid var(--pharaoh-gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-entry { animation: slideIn 0.6s ease-out forwards; }
        
        /* Estilos Específicos para a Lista Expansível (Mobile) */
        .player-row { border-bottom: 1px solid #222; transition: background 0.2s; }
        .player-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; background: #0a0a0a; }
        .player-row.active .player-details { max-height: 800px; padding-bottom: 1rem; border-bottom: 1px solid var(--pharaoh-gold); }
        .player-row.active { background-color: rgba(255, 215, 0, 0.05); }
        .rotate-icon { transition: transform 0.3s; }
        .player-row.active .rotate-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 md:h-16 md:w-16 bg-gray-900 rounded-full border-2 border-gold flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(255,215,0,0.4)]">
                    <img src="logo_farao.png" alt="Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-4xl font-bold leading-none tracking-wide">PELADA DO <span class="text-gold">FARAÓ</span></h1>
                    <p class="text-gray-500 text-[10px] md:text-sm font-medium tracking-widest uppercase">Domingo • 09h - 11h30 • Park Barro</p>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <div class="text-gold font-bold text-lg font-mono">TEMPORADA 2026</div>
                <div class="text-xs text-gray-500 uppercase flex items-center justify-end gap-1">
                    <div id="status-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> 
                    <span id="status-text">Conectando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-8 space-y-8">
        <div id="loading-screen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-gray-400 font-mono animate-pulse mt-2">Sincronizando dados...</p>
            <p id="error-message" class="text-red-500 mt-4 hidden font-bold"></p>
        </div>

        <div id="dashboard-content" class="hidden space-y-12">
            
            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 animate-entry">
                <div class="card-panel p-4 rounded-xl relative overflow-hidden group">
                    <div class="absolute right-0 top-0 p-3 opacity-10"><i class="fas fa-futbol text-6xl text-white"></i></div>
                    <h2 class="text-lg text-gray-400 mb-3 flex items-center gap-2"><i class="fas fa-crosshairs text-gold"></i> Artilharia</h2>
                    <div id="top-scorers" class="space-y-3 relative z-10"></div>
                </div>
                <div class="card-panel p-4 rounded-xl relative overflow-hidden group">
                    <div class="absolute right-0 top-0 p-3 opacity-10"><i class="fas fa-shoe-prints text-6xl text-white"></i></div>
                    <h2 class="text-lg text-gray-400 mb-3 flex items-center gap-2"><i class="fas fa-handshake text-gold"></i> Assistências</h2>
                    <div id="top-assists" class="space-y-3 relative z-10"></div>
                </div>
                <div class="card-panel p-4 rounded-xl relative overflow-hidden group">
                    <div class="absolute right-0 top-0 p-3 opacity-10"><i class="fas fa-shield-alt text-6xl text-white"></i></div>
                    <h2 class="text-lg text-gray-400 mb-3 flex items-center gap-2"><i class="fas fa-users text-gold"></i> Time da Rodada</h2>
                    <div id="top-team" class="space-y-3 relative z-10"></div>
                </div>
                <div class="card-panel p-4 rounded-xl relative overflow-hidden group">
                    <div class="absolute right-0 top-0 p-3 opacity-10"><i class="fas fa-trophy text-6xl text-white"></i></div>
                    <h2 class="text-lg text-gray-400 mb-3 flex items-center gap-2"><i class="fas fa-crown text-gold"></i> Craque da rodada</h2>
                    <div id="top-winner" class="space-y-3 relative z-10"></div>
                </div>
            </section>

            <section class="animate-entry" style="animation-delay: 0.2s;">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-2xl md:text-4xl text-white border-l-4 border-gold pl-3">SELEÇÃO DO MÊS</h2>
                        <span id="month-label" class="ml-3 text-[10px] md:text-xs text-gold font-mono uppercase border border-gold/30 px-2 py-1 rounded bg-black/50">CARREGANDO...</span>
                    </div>
                </div>
                <div class="overflow-x-auto pb-4 -mx-4 px-4 md:mx-0 md:px-0">
                    <div id="selection-grid" class="flex md:grid md:grid-cols-6 gap-4 min-w-[600px] md:min-w-0"></div>
                </div>
            </section>

            <section class="animate-entry" style="animation-delay: 0.4s;">
                <div class="flex flex-col md:flex-row items-center justify-between mb-4 gap-4">
                    <h2 class="text-2xl md:text-4xl text-white border-l-4 border-gold pl-3 w-full md:w-auto">RANKING GERAL</h2>
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search-input" placeholder="Buscar atleta..." class="w-full bg-black/50 border border-gray-700 text-white rounded-full py-3 pl-10 pr-4 focus:outline-none focus:border-gold">
                        <i class="fas fa-search absolute left-3 top-3.5 text-gray-500"></i>
                    </div>
                </div>

                <div class="rounded-lg shadow-2xl border border-gray-800 bg-[#0f0f0f] overflow-hidden">
                    <div class="p-3 bg-gray-900 border-b border-gray-800 flex justify-between text-xs text-gray-500 font-bold uppercase tracking-wider">
                        <span class="w-10 text-center">#</span>
                        <span class="flex-grow pl-2">Atleta</span>
                        <span class="w-16 text-center text-gold">PTS</span>
                        <span class="w-8 text-center"></span>
                    </div>
                    
                    <div id="ranking-list" class="divide-y divide-gray-800">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-black border-t border-gray-900 py-8 mt-8 text-center text-gray-600 text-sm">
        <p class="text-gold font-bold text-xl font-['Teko'] tracking-widest mb-2">PELADA DO FARAÓ</p>
        <p>© 2026 Recife.</p>
    </footer>

    <script>
        // =================================================================
        // CONFIGURAÇÕES
        // =================================================================
        
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=1503533834&single=true&output=csv"; 

        const CAMINHO_FOTOS = "./fotos/";
        const FORMATO_FOTO = ".jpg";
        const FOTO_GENERICA = "https://cdn-icons-png.flaticon.com/512/847/847969.png";

        let allMatches = [];
        let globalAggregated = [];

        // =================================================================
        // CONEXÃO
        // =================================================================
        async function init() {
            const errorMsg = document.getElementById('error-message');
            
            try {
                const response = await fetch(SHEET_URL);
                const txt = await response.text();

                if(txt.trim().startsWith("<!DOCTYPE") || txt.trim().startsWith("<html")) {
                    throw new Error("Link incorreto! Use o link CSV.");
                }

                processData(txt);
                
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('status-indicator').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').classList.add('text-green-500');

                renderDashboard();

            } catch (err) {
                console.error(err);
                errorMsg.innerHTML = `Erro: ${err.message}`;
                errorMsg.classList.remove('hidden');
            }
        }

        function processData(csvText) {
            const rows = csvText.trim().split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const headers = rows[0].map(h => h.replace(/^"|"$/g, '').trim().toLowerCase());
            
            allMatches = [];
            
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                if(row.length === 0 || !row[0]) continue; 

                const getVal = (keyPart) => {
                    let idx = headers.findIndex(h => h === keyPart.toLowerCase());
                    if (idx === -1) idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    
                    if(idx === -1) return 0;
                    
                    let val = row[idx] ? row[idx].replace(/^"|"$/g, '').trim() : "0";
                    val = val.replace(',', '.'); 
                    
                    if(val.toUpperCase() === 'S') return 1;
                    if(val.toUpperCase() === 'N') return 0;
                    return Number(val) || 0;
                };

                const getStr = (keyPart) => {
                    let idx = headers.findIndex(h => h === keyPart.toLowerCase());
                    if (idx === -1) idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    return (idx !== -1 && row[idx]) ? row[idx].replace(/^"|"$/g, '').trim() : "";
                };

                const nome = getStr('atleta'); 
                if(!nome) continue;

                const match = {
                    data: getStr('data'), 
                    nome: nome,
                    posicao: normalizePos(getStr('posicao')),
                    gols: getVal('gols'), 
                    assis: getVal('assistências'), 
                    vitoria: getVal('vitoria'), 
                    presenca: getVal('quantidade partidas'), 
                    pontual: getVal('pontualidade'), 
                    atraso: getVal('atrasos'), 
                    clean: getVal('clean_sheet'), 
                    cartao: getVal('cartões'), 
                    furo: getVal('furo'), 
                    gols_contra: getVal('gols contra'), 
                    timeRodada: getVal('time da rodada'),
                    craqueRodada: getVal('craque da rodada'),
                    total: getVal('pontuação total') 
                };
                allMatches.push(match);
            }
            globalAggregated = aggregateData(allMatches);
        }

        function aggregateData(matchesList) {
            const map = {};
            matchesList.forEach(m => {
                if(!map[m.nome]) {
                    map[m.nome] = { ...m, gols:0, assis:0, vitoria:0, presenca:0, pontual:0, atraso:0, clean:0, cartao:0, furo:0, gols_contra:0, timeRodada:0, craqueRodada:0, total:0 };
                }
                const p = map[m.nome];
                p.gols += m.gols; p.assis += m.assis; p.vitoria += m.vitoria;
                p.presenca += m.presenca; p.pontual += m.pontual; p.atraso += m.atraso;
                p.clean += m.clean; p.cartao += m.cartao; p.furo += m.furo;
                p.gols_contra += m.gols_contra;
                p.timeRodada += m.timeRodada;   
                p.craqueRodada += m.craqueRodada; 
                p.total += m.total; 
            });
            return Object.values(map);
        }

        function normalizePos(pos) {
            pos = pos.toLowerCase();
            if(pos.includes('gol')) return 'GOL';
            if(pos.includes('zag')) return 'ZAG';
            if(pos.includes('mei')) return 'MEI';
            if(pos.includes('ata')) return 'ATA';
            return 'MEI';
        }

        function getMonthKey(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('/');
            if(parts.length >= 3) return `${parts[1]}/${parts[2]}`;
            return ""; 
        }

        function getLatestMonth() {
            const months = [...new Set(allMatches.map(m => getMonthKey(m.data)))].filter(m => m !== "");
            if(months.length === 0) return "";
            const sorted = months.sort((a,b) => {
                const [ma, ya] = a.split('/');
                const [mb, yb] = b.split('/');
                return (yb + mb) - (ya + ma);
            });
            return sorted[0];
        }

        function getMonthName(monthKey) {
            const [m, y] = monthKey.split('/');
            const date = new Date(y, m - 1);
            return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
        }

        function getFoto(nome) { 
            let cleanName = nome.toLowerCase().trim();
            if(cleanName === "movel") cleanName = "móvel";
            return `${CAMINHO_FOTOS}${cleanName}${FORMATO_FOTO}`; 
        }
        const imgError = `this.onerror=null; this.src='${FOTO_GENERICA}';`;

        function renderDashboard() {
            renderTopLists(); 
            renderList();    
            
            const latestMonth = getLatestMonth();
            if(latestMonth) {
                document.getElementById('month-label').innerText = getMonthName(latestMonth);
                renderSelection(latestMonth);
            } else {
                document.getElementById('month-label').innerText = "GERAL / SEM DADOS MENSAIS";
            }
        }

        function renderTopLists() {
            const dataWithPoints = [...globalAggregated];

            const createRow = (p, value, label, index) => {
                const colorClass = index === 0 ? "text-gold font-bold text-base" : "text-gray-300 text-sm";
                return `
                    <div class="flex justify-between items-center py-2 border-b border-gray-800 last:border-0">
                        <div class="flex items-center gap-3">
                            <span class="font-mono text-gray-600 w-4 text-xs">${index + 1}.</span>
                            <div class="h-10 w-10 rounded-full overflow-hidden border border-gray-700 bg-gray-900 shrink-0">
                                <img src="${getFoto(p.nome)}" class="w-full h-full object-cover" onerror="${imgError}">
                            </div>
                            <span class="${colorClass} truncate max-w-[80px] md:max-w-none">${p.nome}</span>
                        </div>
                        <div class="font-mono font-bold text-white bg-gray-800 px-2 rounded text-xs">
                            ${value} <span class="text-[10px] text-gray-500 font-normal">${label}</span>
                        </div>
                    </div>
                `;
            };

            const topGols = [...dataWithPoints].filter(p => p.gols > 0).sort((a,b) => b.gols - a.gols || b.total - a.total).slice(0, 5);
            document.getElementById('top-scorers').innerHTML = topGols.length ? topGols.map((p, i) => createRow(p, p.gols, 'GOLS', i)).join('') : '<div class="text-xs text-gray-500">Sem dados</div>';

            const topAssis = [...dataWithPoints].filter(p => p.assis > 0).sort((a,b) => b.assis - a.assis || b.total - a.total).slice(0, 5);
            document.getElementById('top-assists').innerHTML = topAssis.length ? topAssis.map((p, i) => createRow(p, p.assis, 'ASS', i)).join('') : '<div class="text-xs text-gray-500">Sem dados</div>';

            const topTeam = [...dataWithPoints].filter(p => p.timeRodada > 0).sort((a,b) => b.timeRodada - a.timeRodada || b.total - a.total).slice(0, 5);
            document.getElementById('top-team').innerHTML = topTeam.length ? topTeam.map((p, i) => createRow(p, p.timeRodada, 'VEZES', i)).join('') : '<div class="text-xs text-gray-500">Sem dados</div>';
            
            const topWinner = [...dataWithPoints].filter(p => p.craqueRodada > 0).sort((a,b) => b.craqueRodada - a.craqueRodada || b.total - a.total).slice(0, 5);
            document.getElementById('top-winner').innerHTML = topWinner.length ? topWinner.map((p, i) => createRow(p, p.craqueRodada, 'VEZES', i)).join('') : '<div class="text-xs text-gray-500">Sem dados</div>';
        }

        function renderSelection(targetMonth) {
            const monthlyMatches = allMatches.filter(m => getMonthKey(m.data) === targetMonth);
            const monthlyStats = aggregateData(monthlyMatches);
            const statsWithPoints = [...monthlyStats]; 

            const getBest = (pos, count) => {
                return statsWithPoints.filter(p => p.posicao === pos).sort((a,b) => b.total - a.total).slice(0, count);
            };

            const selecao = [...getBest('GOL', 1), ...getBest('ZAG', 1), ...getBest('MEI', 2), ...getBest('ATA', 2)];

            const html = selecao.map(p => `
                <div class="card-panel rounded-lg p-3 flex flex-col items-center justify-center relative overflow-hidden min-w-[140px] flex-shrink-0 md:flex-shrink">
                    <div class="absolute inset-0 bg-gold/5 opacity-0 hover:opacity-100 transition duration-500"></div>
                    <div class="text-[10px] font-mono text-gold mb-2 border border-gold/30 px-2 rounded-full bg-black z-10">${p.posicao}</div>
                    <div class="w-20 h-20 rounded-full border-2 border-gold shadow-lg overflow-hidden mb-2 z-10 bg-gray-900">
                         <img src="${getFoto(p.nome)}" class="w-full h-full object-cover" onerror="${imgError}">
                    </div>
                    <div class="text-xl font-bold text-white font-['Teko'] z-10 leading-none">${p.nome}</div>
                    ${p.posicao !== 'GOL' ? `
                    <div class="text-xl font-black text-gold z-10 leading-none mt-1">${p.total} <span class="text-[8px] text-gray-500 font-normal">PTS</span></div>
                    ` : '<div class="h-6"></div>'} 
                </div>
            `).join('');
            document.getElementById('selection-grid').innerHTML = html;
        }

        function renderList(searchTerm = "") {
            let processed = [...globalAggregated]; 
            
            processed = processed.filter(p => p.posicao !== 'GOL');

            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                processed = processed.filter(p => p.nome.toLowerCase().includes(term) || p.posicao.toLowerCase().includes(term));
            }
            const sorted = processed.sort((a,b) => b.total - a.total);
            
            const html = sorted.map((p, i) => `
                <div class="player-row cursor-pointer" onclick="this.classList.toggle('active')">
                    <div class="flex items-center p-3">
                        <div class="w-10 text-center font-mono ${i<3 ? 'text-gold font-bold text-lg' : 'text-gray-500'}">${i+1}º</div>
                        <div class="flex-grow flex items-center gap-4">
                            <div class="h-14 w-14 rounded-full border border-gray-600 bg-gray-900 overflow-hidden shrink-0">
                                <img src="${getFoto(p.nome)}" class="w-full h-full object-cover" onerror="${imgError}">
                            </div>
                            <div>
                                <div class="font-bold text-gray-200 text-base leading-tight">${p.nome}</div>
                                <span class="text-[10px] text-gold border border-gold/30 px-1.5 rounded bg-black/30 font-mono">${p.posicao}</span>
                            </div>
                        </div>
                        <div class="w-16 text-center font-black text-xl text-gold">${p.total}</div>
                        <div class="w-8 text-center text-gray-500 rotate-icon"><i class="fas fa-chevron-down"></i></div>
                    </div>

                    <div class="player-details px-4">
                        <div class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest border-b border-gray-800 pb-1">Extrato Base</div>
                        <div class="grid grid-cols-2 gap-2 text-sm mb-4">
                             <div class="space-y-1">
                                <div class="flex justify-between text-green-400"><span>✅ Presença</span> <span>${p.presenca}x</span></div>
                                ${p.gols > 0 ? `<div class="flex justify-between text-gray-300"><span>⚽ Gols</span> <span class="text-gold">${p.gols}x</span></div>` : ''}
                                ${p.assis > 0 ? `<div class="flex justify-between text-gray-300"><span>👟 Assis</span> <span class="text-gold">${p.assis}x</span></div>` : ''}
                                ${p.vitoria > 0 ? `<div class="flex justify-between text-gray-300"><span>✌️ Vitórias</span> <span class="text-gold">${p.vitoria}x</span></div>` : ''}
                                ${p.clean > 0 ? `<div class="flex justify-between text-gray-300"><span>🛡️ SG</span> <span class="text-gold">${p.clean}x</span></div>` : ''}
                                ${p.pontual > 0 ? `<div class="flex justify-between text-gray-300"><span>⏰ Pontual</span> <span class="text-gold">${p.pontual}x</span></div>` : ''}
                             </div>
                             <div class="space-y-1">
                                ${p.atraso > 0 ? `<div class="flex justify-between text-red-400"><span>🐢 Atrasos</span> <span>${p.atraso}x</span></div>` : ''}
                                ${p.cartao > 0 ? `<div class="flex justify-between text-red-400"><span>🟨 Cartões</span> <span>${p.cartao}x</span></div>` : ''}
                                ${p.furo > 0 ? `<div class="flex justify-between text-red-600 font-bold"><span>❌ Furos</span> <span>${p.furo}x</span></div>` : ''}
                             </div>
                        </div>

                        <div class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest border-b border-gray-800 pb-1">Estatísticas</div>
                        <div class="grid grid-cols-4 gap-2 text-center bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                            <div class="flex flex-col p-1">
                                <span class="text-[10px] text-gray-500 uppercase">Gols</span>
                                <span class="font-bold text-white text-lg">${p.gols}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[10px] text-gray-500 uppercase">Gols Contra</span>
                                <span class="font-bold text-red-400 text-lg">${p.gols_contra}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[10px] text-gray-500 uppercase">Assis</span>
                                <span class="font-bold text-white text-lg">${p.assis}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[10px] text-gray-500 uppercase">SG</span>
                                <span class="font-bold text-blue-400 text-lg">${p.clean}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[10px] text-gray-500 uppercase">Cartões</span>
                                <span class="font-bold text-yellow-500 text-lg">${p.cartao}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('ranking-list').innerHTML = sorted.length ? html : `<div class="p-8 text-center text-gray-500">Nenhum atleta encontrado.</div>`;
        }

        document.getElementById('search-input').addEventListener('keyup', (e) => renderList(e.target.value));
        init();
    </script>
</body>
</html>
