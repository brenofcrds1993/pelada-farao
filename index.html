<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelada do Faraó - Ranking Ao Vivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;600;700&family=Roboto:wght@400;500;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* CONFIGURAÇÕES VISUAIS */
        :root { --pharaoh-black: #050505; --pharaoh-gold: #FFD700; --text-white: #ffffff; }
        body { background-color: var(--pharaoh-black); color: var(--text-white); font-family: 'Roboto', sans-serif; 
               background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('https://www.transparenttextures.com/patterns/cubes.png'); }
        h1, h2, th, .font-teko { font-family: 'Teko', sans-serif; text-transform: uppercase; }
        .text-gold { color: var(--pharaoh-gold); }
        .bg-gold { background-color: var(--pharaoh-gold); color: black; }
        
        .card-panel { background: linear-gradient(145deg, #0f0f0f, #0a0a0a); border: 1px solid #222; border-top: 3px solid var(--pharaoh-gold); transition: transform 0.3s ease; }
        .card-panel:hover { transform: translateY(-5px); border-color: var(--pharaoh-gold); }
        
        /* Loader */
        .loader { border: 3px solid #333; border-top: 3px solid var(--pharaoh-gold); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Estilos Específicos para a Lista Expansível */
        .player-row { border-bottom: 1px solid #222; transition: background 0.2s; }
        .player-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; background: #0a0a0a; }
        .player-row.active .player-details { max-height: 500px; padding-bottom: 1rem; border-bottom: 1px solid var(--pharaoh-gold); }
        .player-row.active { background-color: rgba(255, 215, 0, 0.05); }
        .rotate-icon { transition: transform 0.3s; }
        .player-row.active .rotate-icon { transform: rotate(180deg); }

    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="h-14 w-14 md:h-16 md:w-16 bg-gray-900 rounded-full border-2 border-gold flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(255,215,0,0.4)]">
                    <img src="logo_farao.png" alt="Logo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl md:text-4xl font-bold leading-none tracking-wide">PELADA DO <span class="text-gold">FARAÓ</span></h1>
                    <p class="text-gray-500 text-[10px] md:text-sm font-medium tracking-widest uppercase">Domingo • 09h - 11h30 • Park Barro</p>
                </div>
            </div>
            <div class="hidden md:block text-right">
                <div class="text-gold font-bold text-lg font-mono">TEMPORADA 2026</div>
                <div class="text-xs text-gray-500 uppercase flex items-center justify-end gap-1">
                    <div id="status-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> 
                    <span id="status-text">Conectando...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-8 space-y-8">
        <div id="loading-screen" class="text-center py-20">
            <div class="loader"></div>
            <p class="text-gray-400 font-mono animate-pulse mt-2">Sincronizando dados...</p>
            <p id="error-message" class="text-red-500 mt-4 hidden font-bold"></p>
        </div>

        <div id="dashboard-content" class="hidden space-y-12">
            
            <section class="animate-entry" style="animation-delay: 0.2s;">
                <div class="flex items-center justify-between mb-4">
                    <div>
                        <h2 class="text-2xl md:text-4xl text-white border-l-4 border-gold pl-3">SELEÇÃO DO MÊS</h2>
                        <span id="month-label" class="ml-3 text-[10px] md:text-xs text-gold font-mono uppercase border border-gold/30 px-2 py-1 rounded bg-black/50">CARREGANDO...</span>
                    </div>
                </div>
                <div class="overflow-x-auto pb-4 -mx-4 px-4 md:mx-0 md:px-0">
                    <div id="selection-grid" class="flex md:grid md:grid-cols-6 gap-4 min-w-[600px] md:min-w-0"></div>
                </div>
            </section>

            <section class="animate-entry" style="animation-delay: 0.4s;">
                <div class="flex flex-col md:flex-row items-center justify-between mb-4 gap-4">
                    <h2 class="text-2xl md:text-4xl text-white border-l-4 border-gold pl-3 w-full md:w-auto">RANKING GERAL</h2>
                    <div class="relative w-full md:w-64">
                        <input type="text" id="search-input" placeholder="Buscar atleta..." class="w-full bg-black/50 border border-gray-700 text-white rounded-full py-3 pl-10 pr-4 focus:outline-none focus:border-gold">
                        <i class="fas fa-search absolute left-3 top-3.5 text-gray-500"></i>
                    </div>
                </div>

                <div class="rounded-lg shadow-2xl border border-gray-800 bg-[#0f0f0f] overflow-hidden">
                    <div class="p-3 bg-gray-900 border-b border-gray-800 flex justify-between text-xs text-gray-500 font-bold uppercase tracking-wider">
                        <span class="w-12 text-center">#</span>
                        <span class="flex-grow pl-2">Atleta</span>
                        <span class="w-16 text-center text-gold">PTS</span>
                        <span class="w-8 text-center"></span> </div>
                    
                    <div id="ranking-list" class="divide-y divide-gray-800">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="bg-black border-t border-gray-900 py-8 mt-8 text-center text-gray-600 text-sm">
        <p class="text-gold font-bold text-xl font-['Teko'] tracking-widest mb-2">PELADA DO FARAÓ</p>
        <p>© 2026 Recife.</p>
    </footer>

    <script>
        // =================================================================
        // CONFIGURAÇÕES
        // =================================================================
        
        // 👇👇 COLE O LINK CSV AQUI 👇👇
        const SHEET_URL = "COLE_SEU_LINK_CSV_AQUI"; 
        // --------------------------------------------------

        const CAMINHO_FOTOS = "./fotos/";
        const FORMATO_FOTO = ".jpg";
        const FOTO_GENERICA = "https://cdn-icons-png.flaticon.com/512/847/847969.png";

        const REGRAS = {
            presenca: 5, pontualidade: 2, atraso: -1, clean_sheet: 3,
            vitoria: 2, gol: 3, assistencia: 2, cartao: -2, furo: -10
        };

        let allMatches = [];
        let globalAggregated = [];

        // =================================================================
        // CONEXÃO
        // =================================================================
        async function init() {
            const errorMsg = document.getElementById('error-message');
            
            if(SHEET_URL.includes("COLE_SEU")) {
                errorMsg.innerText = "ERRO: Cole o link CSV no código!";
                errorMsg.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch(SHEET_URL);
                const txt = await response.text();

                if(txt.trim().startsWith("<!DOCTYPE") || txt.trim().startsWith("<html")) {
                    throw new Error("Link incorreto! Use o link CSV.");
                }

                processData(txt);
                
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                document.getElementById('status-indicator').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('status-text').innerText = "Online";
                document.getElementById('status-text').classList.add('text-green-500');

                renderDashboard();

            } catch (err) {
                console.error(err);
                errorMsg.innerHTML = `Erro: ${err.message}`;
                errorMsg.classList.remove('hidden');
            }
        }

        function processData(csvText) {
            const rows = csvText.split('\n').map(r => r.split(','));
            const headers = rows[0].map(h => h.trim().replaceAll('"', '').toLowerCase());
            
            allMatches = [];
            
            for(let i=1; i<rows.length; i++) {
                const row = rows[i];
                if(row.length < headers.length) continue;

                const getVal = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    if(idx === -1) return 0;
                    let val = row[idx] ? row[idx].replaceAll('"', '').trim() : "0";
                    if(val.toUpperCase() === 'S') return 1;
                    if(val.toUpperCase() === 'N') return 0;
                    return Number(val) || 0;
                };

                const getStr = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    return (idx !== -1 && row[idx]) ? row[idx].replaceAll('"', '').trim() : "";
                };

                const nome = getStr('nomeatleta');
                if(!nome) continue;

                const match = {
                    data: getStr('data'),
                    nome: nome,
                    posicao: normalizePos(getStr('posicao')),
                    gols: getVal('qtdgols'),
                    assis: getVal('qtdassistencias'),
                    vitoria: getVal('qtdvitorias'),
                    presenca: getVal('presenca'),
                    pontual: getVal('chegou_nahora'),
                    atraso: getVal('chegou_atrasado'),
                    clean: getVal('clean_sheet'),
                    cartao: getVal('cartao'),
                    furo: getVal('confirmou_e_naofoi'),
                    timeRodada: (getStr('timerodada').toUpperCase() === 'S' ? 1 : 0)
                };
                allMatches.push(match);
            }
            globalAggregated = aggregateData(allMatches);
        }

        function aggregateData(matchesList) {
            const map = {};
            matchesList.forEach(m => {
                if(!map[m.nome]) {
                    map[m.nome] = { ...m, gols:0, assis:0, vitoria:0, presenca:0, pontual:0, atraso:0, clean:0, cartao:0, furo:0, timeRodada:0 };
                }
                const p = map[m.nome];
                p.gols += m.gols; p.assis += m.assis; p.vitoria += m.vitoria;
                p.presenca += m.presenca; p.pontual += m.pontual; p.atraso += m.atraso;
                p.clean += m.clean; p.cartao += m.cartao; p.furo += m.furo;
                p.timeRodada += m.timeRodada;
            });
            return Object.values(map);
        }

        function normalizePos(pos) {
            pos = pos.toLowerCase();
            if(pos.includes('gol')) return 'GOL';
            if(pos.includes('zag')) return 'ZAG';
            if(pos.includes('mei')) return 'MEI';
            if(pos.includes('ata')) return 'ATA';
            return 'MEI';
        }

        function calcPoints(p) {
            return (p.presenca * REGRAS.presenca) + (p.pontual * REGRAS.pontualidade) +
                   (p.atraso * REGRAS.atraso) + (p.clean * REGRAS.clean_sheet) +
                   (p.vitoria * REGRAS.vitoria) + (p.gols * REGRAS.gol) +
                   (p.assis * REGRAS.assistencia) + (p.cartao * REGRAS.cartao) +
                   (p.furo * REGRAS.furo);
        }

        // =================================================================
        // LÓGICA DE DATAS
        // =================================================================
        function getMonthKey(dateStr) {
            if(!dateStr) return "";
            const parts = dateStr.split('/');
            if(parts.length >= 3) return `${parts[1]}/${parts[2]}`;
            return ""; 
        }

        function getLatestMonth() {
            const months = [...new Set(allMatches.map(m => getMonthKey(m.data)))].filter(m => m !== "");
            if(months.length === 0) return "";
            const sorted = months.sort((a,b) => {
                const [ma, ya] = a.split('/');
                const [mb, yb] = b.split('/');
                return (yb + mb) - (ya + ma);
            });
            return sorted[0];
        }

        function getMonthName(monthKey) {
            const [m, y] = monthKey.split('/');
            const date = new Date(y, m - 1);
            return date.toLocaleString('pt-BR', { month: 'long', year: 'numeric' }).toUpperCase();
        }

        // =================================================================
        // RENDERIZAÇÃO
        // =================================================================
        function getFoto(nome) { return `${CAMINHO_FOTOS}${nome.toLowerCase().trim()}${FORMATO_FOTO}`; }
        const imgError = `this.onerror=null; this.src='${FOTO_GENERICA}';`;

        function renderDashboard() {
            renderList(); // Renderiza a nova lista
            
            const latestMonth = getLatestMonth();
            if(latestMonth) {
                document.getElementById('month-label').innerText = getMonthName(latestMonth);
                renderSelection(latestMonth);
            } else {
                document.getElementById('month-label').innerText = "SEM DADOS";
            }
        }

        // Renderiza Seleção (Mesma lógica)
        function renderSelection(targetMonth) {
            const monthlyMatches = allMatches.filter(m => getMonthKey(m.data) === targetMonth);
            const monthlyStats = aggregateData(monthlyMatches);
            const statsWithPoints = monthlyStats.map(p => ({ ...p, total: calcPoints(p) }));

            const getBest = (pos, count) => {
                return statsWithPoints.filter(p => p.posicao === pos).sort((a,b) => b.total - a.total).slice(0, count);
            };

            const selecao = [...getBest('GOL', 1), ...getBest('ZAG', 1), ...getBest('MEI', 2), ...getBest('ATA', 2)];

            const html = selecao.map(p => `
                <div class="card-panel rounded-lg p-3 flex flex-col items-center justify-center relative overflow-hidden min-w-[140px] flex-shrink-0 md:flex-shrink">
                    <div class="absolute inset-0 bg-gold/5 opacity-0 hover:opacity-100 transition duration-500"></div>
                    <div class="text-[10px] font-mono text-gold mb-1 border border-gold/30 px-2 rounded-full bg-black z-10">${p.posicao}</div>
                    <div class="w-14 h-14 rounded-full border-2 border-gold shadow-lg overflow-hidden mb-1 z-10 bg-gray-900">
                         <img src="${getFoto(p.nome)}" class="w-full h-full object-cover" onerror="${imgError}">
                    </div>
                    <div class="text-lg font-bold text-white font-['Teko'] z-10 leading-none">${p.nome}</div>
                    <div class="text-xl font-black text-gold z-10 leading-none mt-1">${p.total} <span class="text-[8px] text-gray-500 font-normal">PTS</span></div>
                </div>
            `).join('');
            document.getElementById('selection-grid').innerHTML = html;
        }

        // *** A NOVA RENDERIZAÇÃO DA LISTA (ACCORDION) ***
        function renderList(searchTerm = "") {
            let processed = globalAggregated.map(p => ({...p, total: calcPoints(p)}));
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                processed = processed.filter(p => p.nome.toLowerCase().includes(term) || p.posicao.toLowerCase().includes(term));
            }
            const sorted = processed.sort((a,b) => b.total - a.total);
            
            const html = sorted.map((p, i) => `
                <div class="player-row cursor-pointer" onclick="this.classList.toggle('active')">
                    <div class="flex items-center p-3">
                        <div class="w-12 text-center font-mono ${i<3 ? 'text-gold font-bold text-lg' : 'text-gray-500'}">${i+1}º</div>
                        
                        <div class="flex-grow flex items-center gap-3">
                            <div class="h-10 w-10 rounded-full border border-gray-600 bg-gray-900 overflow-hidden shrink-0">
                                <img src="${getFoto(p.nome)}" class="w-full h-full object-cover" onerror="${imgError}">
                            </div>
                            <div>
                                <div class="font-bold text-gray-200 text-sm leading-tight">${p.nome}</div>
                                <span class="text-[9px] text-gold border border-gold/30 px-1.5 rounded bg-black/30 font-mono">${p.posicao}</span>
                            </div>
                        </div>
                        
                        <div class="w-16 text-center font-black text-xl text-gold">${p.total}</div>
                        <div class="w-8 text-center text-gray-500 rotate-icon"><i class="fas fa-chevron-down"></i></div>
                    </div>

                    <div class="player-details px-4">
                        <div class="grid grid-cols-4 gap-2 text-center mt-2 bg-gray-900/50 rounded-lg p-3 border border-gray-800">
                            <div class="flex flex-col p-1 rounded hover:bg-white/5">
                                <span class="text-[10px] text-gray-500 uppercase">Gols</span>
                                <span class="font-bold text-white text-lg"><i class="fas fa-futbol text-white mr-1 text-xs"></i>${p.gols}</span>
                            </div>
                            <div class="flex flex-col p-1 rounded hover:bg-white/5">
                                <span class="text-[10px] text-gray-500 uppercase">Assis</span>
                                <span class="font-bold text-white text-lg"><i class="fas fa-shoe-prints text-gray-400 mr-1 text-xs"></i>${p.assis}</span>
                            </div>
                            <div class="flex flex-col p-1 rounded hover:bg-white/5">
                                <span class="text-[10px] text-gray-500 uppercase">Vitórias</span>
                                <span class="font-bold text-green-400 text-lg"><i class="fas fa-trophy text-green-500 mr-1 text-xs"></i>${p.vitoria}</span>
                            </div>
                            <div class="flex flex-col p-1 rounded hover:bg-white/5">
                                <span class="text-[10px] text-gray-500 uppercase">SG</span>
                                <span class="font-bold text-blue-400 text-lg"><i class="fas fa-shield-alt text-blue-500 mr-1 text-xs"></i>${p.clean}</span>
                            </div>

                            <div class="col-span-4 h-px bg-gray-800 my-1"></div>

                            <div class="flex flex-col p-1">
                                <span class="text-[9px] text-gray-500">Presença</span>
                                <span class="font-mono text-gray-300">${p.presenca}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[9px] text-gray-500">Pontual</span>
                                <span class="font-mono text-blue-300">${p.pontual}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[9px] text-gray-500">Atraso</span>
                                <span class="font-mono text-yellow-500">${p.atraso}</span>
                            </div>
                            <div class="flex flex-col p-1">
                                <span class="text-[9px] text-gray-500">Cartão</span>
                                <span class="font-mono text-red-500">${p.cartao}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('ranking-list').innerHTML = sorted.length ? html : `<div class="p-8 text-center text-gray-500">Nenhum atleta encontrado.</div>`;
        }

        document.getElementById('search-input').addEventListener('keyup', (e) => renderList(e.target.value));
        init();
    </script>
</body>
</html>
