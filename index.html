<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelada do Faraó - Ranking Ao Vivo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* APPLE STYLE & FARAÓ COLORS */
        :root {
            --apple-black: #000000;
            --apple-dark-gray: #1C1C1E;
            --pharaoh-gold: #FFD700;
            --pharaoh-gold-muted: rgba(255, 215, 0, 0.4);
        }

        body { 
            background-color: var(--apple-black); 
            color: #ffffff;
            /* Fontes de sistema padrão Apple (SF Pro, etc) */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-image: radial-gradient(circle at top right, rgba(255, 215, 0, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 215, 0, 0.03), transparent 40%);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Efeito Glassmorphism (Vidro Fosco) */
        .glass-card {
            background: rgba(28, 28, 30, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 215, 0, 0.1);
            border-color: rgba(255, 215, 0, 0.3);
        }

        .glass-header {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .text-gold { color: var(--pharaoh-gold); }
        .bg-gold { background-color: var(--pharaoh-gold); }

        /* Loader Apple Style */
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid rgba(255, 215, 0, 0.2);
            border-top: 3px solid var(--pharaoh-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Acordeão do Jogador */
        .player-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s;
        }
        .player-row:last-child { border-bottom: none; }
        
        .player-details {
            max-height: 0; overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), padding 0.4s ease, opacity 0.4s ease;
            opacity: 0;
            background: rgba(0, 0, 0, 0.3);
        }
        .player-row.active .player-details {
            max-height: 500px;
            padding: 1rem;
            opacity: 1;
        }
        .player-row.active {
            background: rgba(255, 215, 0, 0.03);
        }
        .rotate-icon { transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .player-row.active .rotate-icon { transform: rotate(180deg); }

        /* Scrollbar minimalista */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--pharaoh-gold); }
    </style>
</head>
<body class="flex flex-col">

    <header class="glass-header sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="h-12 w-12 bg-black rounded-full border border-yellow-500/50 flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(255,215,0,0.2)]">
                    <i class="fas fa-crown text-gold text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl md:text-2xl font-bold tracking-tight">Faraó <span class="text-gold font-light">Estatísticas</span></h1>
                    <p class="text-[11px] text-gray-400 font-medium tracking-wide uppercase">Domingo • 09h - 11h30</p>
                </div>
            </div>
            <div class="text-right flex items-center gap-2">
                <div id="status-indicator" class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></div> 
                <span id="status-text" class="text-xs text-gray-400 font-medium">Sincronizando...</span>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 md:px-6 py-8 space-y-10 max-w-5xl">
        
        <div id="loading-screen" class="flex flex-col items-center justify-center py-32 space-y-4">
            <div class="spinner"></div>
            <p class="text-gray-400 text-sm font-medium">Buscando dados das planilhas...</p>
            <p id="error-message" class="text-red-400 text-sm mt-4 hidden bg-red-900/20 px-4 py-2 rounded-lg border border-red-500/30"></p>
        </div>

        <div id="dashboard-content" class="hidden space-y-10">
            
            <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="glass-card p-5 relative overflow-hidden flex flex-col justify-between">
                    <div class="text-gold mb-2"><i class="fas fa-futbol text-2xl opacity-80"></i></div>
                    <h2 class="text-xs text-gray-400 uppercase font-semibold tracking-wider mb-1">Artilharia</h2>
                    <div id="highlight-gols" class="text-2xl font-bold">--</div>
                </div>
                <div class="glass-card p-5 relative overflow-hidden flex flex-col justify-between">
                    <div class="text-gold mb-2"><i class="fas fa-handshake text-2xl opacity-80"></i></div>
                    <h2 class="text-xs text-gray-400 uppercase font-semibold tracking-wider mb-1">Assistências</h2>
                    <div id="highlight-assis" class="text-2xl font-bold">--</div>
                </div>
                <div class="glass-card p-5 relative overflow-hidden flex flex-col justify-between">
                    <div class="text-gold mb-2"><i class="fas fa-star text-2xl opacity-80"></i></div>
                    <h2 class="text-xs text-gray-400 uppercase font-semibold tracking-wider mb-1">Maior Craque</h2>
                    <div id="highlight-craque" class="text-2xl font-bold">--</div>
                </div>
                <div class="glass-card p-5 relative overflow-hidden flex flex-col justify-between">
                    <div class="text-gold mb-2"><i class="fas fa-users text-2xl opacity-80"></i></div>
                    <h2 class="text-xs text-gray-400 uppercase font-semibold tracking-wider mb-1">Time da Rodada</h2>
                    <div id="highlight-time" class="text-2xl font-bold">--</div>
                </div>
            </section>

            <section>
                <div class="flex flex-col sm:flex-row items-center justify-between mb-6 gap-4">
                    <h2 class="text-2xl font-semibold tracking-tight">Ranking Geral</h2>
                    <div class="relative w-full sm:w-72">
                        <input type="text" id="search-input" placeholder="Buscar atleta..." 
                               class="w-full bg-[#1C1C1E]/80 backdrop-blur-md border border-gray-700/50 text-white rounded-2xl py-2.5 pl-10 pr-4 focus:outline-none focus:border-yellow-500/50 focus:ring-1 focus:ring-yellow-500/50 transition-all text-sm">
                        <i class="fas fa-search absolute left-3.5 top-3 text-gray-500 text-sm"></i>
                    </div>
                </div>

                <div class="glass-card overflow-hidden">
                    <div class="px-5 py-3 bg-white/5 border-b border-white/10 flex text-xs text-gray-400 font-medium uppercase tracking-wider">
                        <span class="w-8 text-center">#</span>
                        <span class="flex-grow pl-3">Atleta</span>
                        <span class="w-16 text-center text-gold">PTS</span>
                        <span class="w-8 text-center"></span>
                    </div>
                    
                    <div id="ranking-list" class="flex flex-col">
                        </div>
                </div>
            </section>
        </div>
    </main>

    <footer class="py-8 mt-12 text-center text-gray-500 text-xs font-medium border-t border-white/5">
        <p>Pelada do Faraó © 2026. Design estilo Apple.</p>
    </footer>

    <script>
        // =================================================================
        // CONFIGURAÇÕES: LÓGICA PARA MÚLTIPLOS CSVs
        // =================================================================
        // Adicione aqui todos os links dos seus arquivos CSV (como URLs geradas pelo Google Sheets ou outros servidores).
        const CSV_URLS = [
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=0&single=true&output=csv",
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=329197181&single=true&output=csv",
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=1528376786&single=true&output=csv",
			"https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=2134616296&single=true&output=csv",
			"https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=105489423&single=true&output=csv",
			"https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=1503533834&single=true&output=csv",
			"https://docs.google.com/spreadsheets/d/e/2PACX-1vTPAKd_MA4c6oerk1D4nIoykmE09zh_Ff3adKHiw-ByR9XVfkXKXhR7BnVZvpGObFyhRiRhkreZSI7T/pub?gid=429402302&single=true&output=csv",
        ];
        
        const FOTO_GENERICA = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
        
        let atletasAgrupados = [];

        // =================================================================
        // CONEXÃO & LEITURA PARALELA DE DADOS
        // =================================================================
        async function init() {
            const errorMsg = document.getElementById('error-message');
            
            // Simulação local caso as URLs não sejam preenchidas (Para não quebrar visualmente o teste)
            if(CSV_URLS.length === 0 || CSV_URLS[0].includes("URL_DO_CSV_1_AQUI")) {
                errorMsg.innerText = "Aviso: Links não configurados. Por favor, preencha o Array CSV_URLS no código com as URLs corretas dos seus arquivos anexos.";
                errorMsg.classList.remove('hidden');
                // return; // Retire o comentário disso quando for para produção.
            }

            try {
                // Lê todas as URLs do array simultaneamente
                const fetchPromises = CSV_URLS.map(url => fetch(url).then(r => r.ok ? r.text() : ""));
                const resultadosTextos = await Promise.all(fetchPromises);
                
                let dadosAgregados = [];

                resultadosTextos.forEach(textoCsv => {
                    if (textoCsv.trim()) {
                        const parsedData = processarCSV(textoCsv);
                        dadosAgregados = [...dadosAgregados, ...parsedData];
                    }
                });

                if (dadosAgregados.length > 0) {
                    atletasAgrupados = unificarEstatísticas(dadosAgregados);
                }

                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('dashboard-content').classList.remove('hidden');
                
                const indicator = document.getElementById('status-indicator');
                indicator.classList.remove('bg-red-500', 'animate-pulse');
                indicator.classList.add('bg-green-500', 'shadow-[0_0_8px_#22c55e]');
                document.getElementById('status-text').innerText = "Atualizado Agora";
                document.getElementById('status-text').classList.replace('text-gray-400', 'text-green-400');

                renderDashboard();

            } catch (err) {
                console.error(err);
                errorMsg.innerHTML = `Erro de conexão: ${err.message}`;
                errorMsg.classList.remove('hidden');
            }
        }

        // =================================================================
        // PROCESSAMENTO DE DADOS
        // =================================================================
        function processarCSV(csvText) {
            const rows = csvText.split('\n').map(r => r.split(','));
            if (rows.length < 2) return [];
            
            const headers = rows[0].map(h => h.trim().replaceAll('"', '').toLowerCase());
            let partidas = [];

            for(let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if(row.length < headers.length) continue;

                const getVal = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    if(idx === -1) return 0;
                    let val = row[idx] ? row[idx].replaceAll('"', '').trim() : "0";
                    
                    // Transforma 'S' ou 'N' em números, ou converte para float/int
                    if(val.toUpperCase() === 'S') return 1;
                    if(val.toUpperCase() === 'N') return 0;
                    
                    val = val.replace(',', '.'); // ajusta decimais pt-br
                    return Number(val) || 0;
                };

                const getStr = (keyPart) => {
                    const idx = headers.findIndex(h => h.includes(keyPart.toLowerCase()));
                    return (idx !== -1 && row[idx]) ? row[idx].replaceAll('"', '').trim() : "";
                };

                // As variáveis obrigatórias que você solicitou:
                const nome = getStr('atleta') || getStr('nome'); 
                if(!nome) continue;

                partidas.push({
                    nome: nome,
                    posicao: getStr('posi'),
                    gols: getVal('gol'),
                    assis: getVal('assist'),
                    timeRodada: getVal('time da rodada') || getVal('time_rodada'),
                    craqueRodada: getVal('craque') || getVal('vencedor_melhor'),
                    artilheiroRodada: getVal('artilheiro') || getVal('vencedor_artilharia'),
                    partidasQtd: getVal('partida') || getVal('presenca'),
                    pontuacaoTotal: getVal('pontua') || getVal('pontuacao_total')
                });
            }
            return partidas;
        }

        function unificarEstatísticas(dadosBrutos) {
            const map = {};
            dadosBrutos.forEach(m => {
                if(!map[m.nome]) {
                    map[m.nome] = { 
                        nome: m.nome, 
                        posicao: m.posicao || 'N/A', 
                        gols: 0, assis: 0, timeRodada: 0, 
                        craqueRodada: 0, artilheiroRodada: 0, 
                        partidasQtd: 0, pontuacaoTotal: 0 
                    };
                }
                const p = map[m.nome];
                
                // Atualiza ou soma os dados de todas as planilhas cruzadas
                if (m.posicao && m.posicao !== "") p.posicao = m.posicao; 
                p.gols += m.gols;
                p.assis += m.assis;
                p.timeRodada += m.timeRodada;
                p.craqueRodada += m.craqueRodada;
                p.artilheiroRodada += m.artilheiroRodada;
                p.partidasQtd += m.partidasQtd;
                p.pontuacaoTotal += m.pontuacaoTotal;
            });
            return Object.values(map);
        }

        // =================================================================
        // RENDERIZAÇÃO
        // =================================================================
        function getDestaque(lista, prop) {
            if(!lista.length) return { nome: '--', val: 0 };
            const top = [...lista].sort((a,b) => b[prop] - a[prop])[0];
            return top[prop] > 0 ? { nome: top.nome, val: top[prop] } : { nome: '--', val: 0 };
        }

        function renderDashboard() {
            if(!atletasAgrupados.length) return;
            
            // Popula os Highlights
            const topGol = getDestaque(atletasAgrupados, 'gols');
            document.getElementById('highlight-gols').innerHTML = `${topGol.val} <span class="text-xs text-gray-400 font-normal block truncate mt-1">${topGol.nome}</span>`;
            
            const topAssis = getDestaque(atletasAgrupados, 'assis');
            document.getElementById('highlight-assis').innerHTML = `${topAssis.val} <span class="text-xs text-gray-400 font-normal block truncate mt-1">${topAssis.nome}</span>`;
            
            const topCraque = getDestaque(atletasAgrupados, 'craqueRodada');
            document.getElementById('highlight-craque').innerHTML = `${topCraque.val}x <span class="text-xs text-gray-400 font-normal block truncate mt-1">${topCraque.nome}</span>`;
            
            const topTime = getDestaque(atletasAgrupados, 'timeRodada');
            document.getElementById('highlight-time').innerHTML = `${topTime.val}x <span class="text-xs text-gray-400 font-normal block truncate mt-1">${topTime.nome}</span>`;

            renderList();
        }

        function renderList(searchTerm = "") {
            let sorted = [...atletasAgrupados].sort((a,b) => b.pontuacaoTotal - a.pontuacaoTotal);
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                sorted = sorted.filter(p => p.nome.toLowerCase().includes(term) || p.posicao.toLowerCase().includes(term));
            }

            const html = sorted.map((p, i) => `
                <div class="player-row cursor-pointer" onclick="this.classList.toggle('active')">
                    <div class="flex items-center px-5 py-4">
                        <div class="w-8 text-center font-medium ${i < 3 ? 'text-gold' : 'text-gray-500'}">${i + 1}</div>
                        
                        <div class="flex-grow flex items-center gap-4 pl-3">
                            <div class="h-10 w-10 rounded-full border border-gray-600 bg-black overflow-hidden shrink-0 shadow-inner">
                                <img src="${FOTO_GENERICA}" class="w-full h-full object-cover opacity-80" onerror="this.src='${FOTO_GENERICA}'">
                            </div>
                            <div class="flex flex-col">
                                <span class="font-semibold text-gray-100">${p.nome}</span>
                                <span class="text-[10px] text-gray-400 uppercase tracking-wider">${p.posicao}</span>
                            </div>
                        </div>
                        
                        <div class="w-16 text-center font-bold text-lg text-white">
                            ${p.pontuacaoTotal.toFixed(1).replace('.0', '')}
                        </div>
                        
                        <div class="w-8 text-center text-gray-500 rotate-icon">
                            <i class="fas fa-chevron-down text-sm"></i>
                        </div>
                    </div>

                    <div class="player-details">
                        <div class="bg-black/40 rounded-xl p-4 border border-white/5">
                            <h3 class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 border-b border-white/10 pb-2">Estatísticas Consolidadas</h3>
                            
                            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 text-sm">
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gray-500 uppercase">Partidas Jogadas</span>
                                    <span class="font-semibold text-white">${p.partidasQtd}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gray-500 uppercase">Gols</span>
                                    <span class="font-semibold text-white">${p.gols}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gray-500 uppercase">Assistências</span>
                                    <span class="font-semibold text-white">${p.assis}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gold uppercase">Time da Rodada</span>
                                    <span class="font-semibold text-white">${p.timeRodada}x</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gold uppercase">Craque Rodada</span>
                                    <span class="font-semibold text-white">${p.craqueRodada}x</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gold uppercase">Artilheiro Rodada</span>
                                    <span class="font-semibold text-white">${p.artilheiroRodada}x</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('ranking-list').innerHTML = sorted.length ? html : `<div class="p-8 text-center text-gray-500 text-sm">Nenhum atleta encontrado.</div>`;
        }

        document.getElementById('search-input').addEventListener('input', (e) => renderList(e.target.value));
        
        // Inicializa
        init();
    </script>
</body>
</html>
