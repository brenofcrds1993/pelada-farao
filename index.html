<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pelada do Faraó - 04/01/2026</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@300;400;600;700&family=Roboto:wght@400;500;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* === CONFIGURAÇÕES VISUAIS FARAÓ === */
        :root {
            --pharaoh-black: #050505;
            --pharaoh-dark-gray: #0f0f0f;
            --pharaoh-gold: #FFD700;
            --pharaoh-gold-dim: #b39500;
            --text-white: #ffffff;
            --border-glow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        body {
            background-color: var(--pharaoh-black);
            color: var(--text-white);
            font-family: 'Roboto', sans-serif;
            background-image: 
                linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)),
                url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        /* Títulos Impactantes */
        h1, h2, .stat-value, .rank-number {
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
        }

        /* Utilitários de Cor */
        .text-gold { color: var(--pharaoh-gold); }
        .bg-gold { background-color: var(--pharaoh-gold); color: black; }
        .border-gold { border-color: var(--pharaoh-gold); }

        /* CARDS */
        .card-panel {
            background: linear-gradient(145deg, #0f0f0f, #0a0a0a);
            border: 1px solid #222;
            border-top: 3px solid var(--pharaoh-gold);
            box-shadow: 0 4px 6px rgba(0,0,0,0.7);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .card-panel:hover {
            transform: translateY(-5px);
            box-shadow: var(--border-glow);
            border-color: var(--pharaoh-gold);
        }

        /* TABELA */
        .custom-table thead th {
            background-color: #1a1a1a;
            color: var(--pharaoh-gold);
            font-family: 'Teko', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            padding: 12px;
        }
        .custom-table tbody tr {
            border-bottom: 1px solid #222;
            transition: background 0.2s;
        }
        .rank-1 { color: var(--pharaoh-gold); text-shadow: 0 0 5px var(--pharaoh-gold); }

        /* Animações */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-entry { animation: slideIn 0.6s ease-out forwards; }

        /* Scrollbar Personalizada para a Tabela */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0f0f0f; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--pharaoh-gold); 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-800 bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="h-16 w-16 md:h-20 md:w-20 bg-gray-900 rounded-full border-2 border-gold flex items-center justify-center overflow-hidden shadow-[0_0_15px_rgba(255,215,0,0.4)]">
                    <img src="logo_farao.png" alt="Logo Faraó" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-3xl md:text-5xl font-bold leading-none tracking-wide">
                        PELADA DO <span class="text-gold">FARAÓ</span>
                    </h1>
                    <p class="text-gray-500 text-sm md:text-base font-medium tracking-widest uppercase">
                        Domingo • Horário: 09h ÀS 11h30 • Local: Park Barro Society
                    </p>
                </div>
            </div>
            
            <div class="hidden md:block text-right">
                <div class="text-gold font-bold text-lg font-mono">04/01/2026</div>
                <div class="text-xs text-gray-500 uppercase">Última Atualização</div>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 md:p-8 space-y-12">

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 animate-entry">
            
            <div class="card-panel p-6 rounded-xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-futbol text-8xl text-white"></i>
                </div>
                <h2 class="text-2xl text-gray-400 mb-4 flex items-center gap-2">
                    <i class="fas fa-crosshairs text-gold"></i> Artilharia
                </h2>
                <div id="top-scorers" class="space-y-3 relative z-10">
                    </div>
            </div>

            <div class="card-panel p-6 rounded-xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-shoe-prints text-8xl text-white"></i>
                </div>
                <h2 class="text-2xl text-gray-400 mb-4 flex items-center gap-2">
                    <i class="fas fa-handshake text-gold"></i> Assistências
                </h2>
                <div id="top-assists" class="space-y-3 relative z-10">
                    </div>
            </div>

            <div class="card-panel p-6 rounded-xl relative overflow-hidden group">
                <div class="absolute right-0 top-0 p-4 opacity-10 group-hover:opacity-20 transition">
                    <i class="fas fa-shield-alt text-8xl text-white"></i>
                </div>
                <h2 class="text-2xl text-gray-400 mb-4 flex items-center gap-2">
                    <i class="fas fa-users text-gold"></i> Time da Rodada
                </h2>
                <div id="top-team" class="space-y-3 relative z-10">
                    </div>
            </div>
        </section>

        <section class="animate-entry" style="animation-delay: 0.2s;">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl md:text-4xl text-white border-l-4 border-gold pl-4">
                    SELEÇÃO DO MÊS
                </h2>
                <div class="flex gap-2 flex-wrap justify-end">
                    <span class="text-xs font-mono text-gray-500 border border-gray-800 px-2 py-1 rounded bg-black/50">1 GOL</span>
                    <span class="text-xs font-mono text-gray-500 border border-gray-800 px-2 py-1 rounded bg-black/50">1 ZAG</span>
                    <span class="text-xs font-mono text-gray-500 border border-gray-800 px-2 py-1 rounded bg-black/50">2 MEI</span>
                    <span class="text-xs font-mono text-gray-500 border border-gray-800 px-2 py-1 rounded bg-black/50">2 ATA</span>
                </div>
            </div>
            
            <div id="selection-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4">
                </div>
        </section>

        <section class="animate-entry" style="animation-delay: 0.4s;">
            <div class="flex flex-col md:flex-row items-center justify-between mb-4 gap-4">
                <div class="flex items-center">
                    <h2 class="text-3xl md:text-4xl text-white border-l-4 border-gold pl-4">
                        CLASSIFICAÇÃO GERAL
                    </h2>
                    <span class="ml-4 bg-gray-800 text-gold px-3 py-1 rounded text-sm font-bold border border-gold/30 hidden sm:inline-block">
                        TEMPORADA 2026
                    </span>
                </div>

                <div class="relative w-full md:w-64">
                    <input type="text" id="search-input" placeholder="Buscar atleta..." 
                        class="w-full bg-black/50 border border-gray-700 text-white rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-gold focus:ring-1 focus:ring-gold transition placeholder-gray-600">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-500"></i>
                </div>
            </div>
            
            <div class="rounded-lg shadow-2xl border border-gray-800 overflow-hidden bg-[#0a0a0a]">
                <div class="overflow-y-auto max-h-[500px] custom-scrollbar">
                    <table class="w-full text-left custom-table">
                        <thead class="sticky top-0 z-20 shadow-lg">
                            <tr>
                                <th class="text-center w-16">#</th>
                                <th>ATLETA</th>
                                <th class="text-center text-white bg-gray-900">PTS</th>
                                <th class="text-center">GOLS</th>
                                <th class="text-center">ASSIS</th>
                                <th class="text-center hidden sm:table-cell text-green-500">VIT</th>
                                <th class="text-center hidden sm:table-cell text-red-500">DER</th>
                            </tr>
                        </thead>
                        <tbody id="ranking-body" class="text-gray-300 font-medium">
                            </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-black border-t border-gray-900 py-8 mt-8 text-center">
        <p class="text-gold font-bold text-xl font-['Teko'] tracking-widest">PELADA DO FARAÓ</p>
        <p class="text-gray-600 text-sm mt-2">© 2026 Recife.</p>
    </footer>

    <script>
        // =================================================================
        // CONFIGURAÇÕES
        // =================================================================
        const CAMINHO_FOTOS = "./fotos/"; // Pasta onde estão as imagens
        const FORMATO_FOTO = ".jpg";      // Extensão (.png, .jpg, .jpeg)
        const FOTO_GENERICA = "https://cdn-icons-png.flaticon.com/512/847/847969.png"; // Avatar padrão (silhueta)

        // =================================================================
        // DADOS REAIS - ATUALIZADOS EM 04/01/2026
        // =================================================================
        
        const playersData = [
            // --- TIME 5 (CAMPEÃO - 15 PTS) ---
            { nome: "Bruno",    posicao: "ZAG", gols: 1, assis: 2, pts: 15, vit: 5, der: 1, timeRodada: 1 },
            { nome: "Móvel",    posicao: "ATA", gols: 4, assis: 0, pts: 15, vit: 5, der: 1, timeRodada: 1 },
            { nome: "Noé",      posicao: "MEI", gols: 0, assis: 1, pts: 15, vit: 5, der: 1, timeRodada: 1 },
            { nome: "Gustavo",  posicao: "MEI", gols: 1, assis: 1, pts: 15, vit: 5, der: 1, timeRodada: 1 },
            { nome: "Juca",     posicao: "GOL", gols: 0, assis: 0, pts: 15, vit: 5, der: 1, timeRodada: 1 },

            // --- TIME 1 (9 PTS) ---
            { nome: "Aquiles",  posicao: "ZAG", gols: 2, assis: 0, pts: 9,  vit: 3, der: 2, timeRodada: 0 },
            { nome: "Breno",    posicao: "ATA", gols: 0, assis: 2, pts: 9,  vit: 3, der: 2, timeRodada: 0 },
            { nome: "Wilker",   posicao: "MEI", gols: 3, assis: 0, pts: 9,  vit: 3, der: 2, timeRodada: 0 },
            { nome: "Túlio",    posicao: "ZAG", gols: 0, assis: 0, pts: 9,  vit: 3, der: 2, timeRodada: 0 },
            { nome: "Goiaba",   posicao: "MEI", gols: 2, assis: 0, pts: 9,  vit: 3, der: 2, timeRodada: 0 },

            // --- TIME 3 (6 PTS) ---
            { nome: "Braulio",  posicao: "ATA", gols: 0, assis: 0, pts: 6,  vit: 2, der: 2, timeRodada: 0 },
            { nome: "Juninho",  posicao: "MEI", gols: 1, assis: 2, pts: 6,  vit: 2, der: 2, timeRodada: 0 },
            { nome: "Tarcísio", posicao: "ATA", gols: 1, assis: 0, pts: 6,  vit: 2, der: 2, timeRodada: 0 },
            { nome: "Jojo",     posicao: "MEI", gols: 0, assis: 0, pts: 6,  vit: 2, der: 2, timeRodada: 0 },

            // --- TIME 2 (3 PTS) ---
            { nome: "Yushin",   posicao: "ZAG", gols: 2, assis: 0, pts: 3,  vit: 1, der: 2, timeRodada: 0 },
            { nome: "Pereira",  posicao: "ATA", gols: 1, assis: 2, pts: 3,  vit: 1, der: 2, timeRodada: 0 },
            { nome: "Ryan",     posicao: "MEI", gols: 3, assis: 0, pts: 3,  vit: 1, der: 2, timeRodada: 0 },
            { nome: "Rodrigo",  posicao: "MEI", gols: 0, assis: 0, pts: 3,  vit: 1, der: 2, timeRodada: 0 },
            { nome: "Zaca",     posicao: "MEI", gols: 1, assis: 0, pts: 3,  vit: 1, der: 2, timeRodada: 0 },

            // --- TIME 4 (0 PTS) ---
            { nome: "Luan",     posicao: "MEI", gols: 0, assis: 0, pts: 0,  vit: 0, der: 2, timeRodada: 0 },
            { nome: "Nedson",   posicao: "ZAG", gols: 0, assis: 0, pts: 0,  vit: 0, der: 2, timeRodada: 0 },
            { nome: "Rodrigo01",posicao: "MEI", gols: 0, assis: 2, pts: 0,  vit: 0, der: 2, timeRodada: 0 },
            { nome: "Xande",    posicao: "ATA", gols: 1, assis: 0, pts: 0,  vit: 0, der: 2, timeRodada: 0 }
        ];

        // =================================================================
        // LÓGICA DE RENDERIZAÇÃO
        // =================================================================

        // Helper para gerar URL da foto
        function getFoto(nome) {
            // Converte para minúsculo, mas MANTÉM os acentos
            // Exemplo: O código envia "Móvel" -> a função transforma em "móvel" para bater com o arquivo
            return `${CAMINHO_FOTOS}${nome.toLowerCase().trim()}${FORMATO_FOTO}`;
        }

        // Helper para tratar erro de imagem (Fallback)
        // Nota: O tratamento 'onerror' é inserido diretamente na string HTML abaixo
        const imgError = `this.onerror=null; this.src='${FOTO_GENERICA}';`;

        function renderDashboard() {
            renderTopLists();
            renderTable();
            renderSelection();
        }

        function renderTopLists() {
            const createRow = (p, value, label, index) => {
                const colorClass = index === 0 ? "text-gold font-bold text-lg" : "text-gray-300";
                const borderClass = index === 0 ? "border-l-2 border-gold pl-2 bg-white/5" : "";
                
                return `
                    <div class="flex justify-between items-center py-2 ${borderClass}">
                        <div class="flex items-center gap-3">
                            <span class="font-mono text-gray-600 w-4">${index + 1}.</span>
                            <div class="h-8 w-8 rounded-full overflow-hidden border border-gray-700 bg-gray-900">
                                <img src="${getFoto(p.nome)}" alt="${p.nome}" class="w-full h-full object-cover" onerror="${imgError}">
                            </div>
                            <span class="${colorClass}">${p.nome}</span>
                        </div>
                        <div class="font-mono font-bold text-white bg-gray-800 px-2 rounded">
                            ${value} <span class="text-xs text-gray-500 font-normal">${label}</span>
                        </div>
                    </div>
                `;
            };

            const topGols = [...playersData].sort((a,b) => b.gols - a.gols).slice(0, 5);
            document.getElementById('top-scorers').innerHTML = topGols.map((p, i) => createRow(p, p.gols, 'GOLS', i)).join('');

            const topAssis = [...playersData].sort((a,b) => b.assis - a.assis).slice(0, 5);
            document.getElementById('top-assists').innerHTML = topAssis.map((p, i) => createRow(p, p.assis, 'ASS', i)).join('');

            const topTeam = [...playersData].sort((a,b) => b.timeRodada - a.timeRodada || b.pts - a.pts).slice(0, 5);
            document.getElementById('top-team').innerHTML = topTeam.map((p, i) => createRow(p, p.timeRodada, 'VEZES', i)).join('');
        }

        function renderTable(searchTerm = "") {
            let filteredPlayers = playersData;
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredPlayers = playersData.filter(p => 
                    p.nome.toLowerCase().includes(term) || 
                    p.posicao.toLowerCase().includes(term)
                );
            }

            const sorted = [...filteredPlayers].sort((a,b) => b.pts - a.pts || b.vit - a.vit || b.gols - a.gols);
            
            const html = sorted.map((p, i) => {
                const rankStyle = i < 3 && !searchTerm ? `rank-${i+1} font-bold` : 'text-gray-500';
                const rowBg = i % 2 === 0 ? 'bg-white/[0.02]' : '';
                
                return `
                <tr class="${rowBg} hover:bg-gray-800 transition-colors">
                    <td class="text-center py-3 font-mono ${rankStyle} align-middle">${i+1}º</td>
                    <td class="py-2 font-bold text-gray-200 uppercase tracking-wide flex items-center gap-3 align-middle">
                        <div class="h-10 w-10 rounded-full overflow-hidden border border-gray-600 bg-gray-900 shrink-0">
                            <img src="${getFoto(p.nome)}" alt="${p.nome}" class="w-full h-full object-cover" onerror="${imgError}">
                        </div>
                        <div>
                            <div class="leading-tight">${p.nome}</div>
                            <span class="text-[10px] text-gray-500 border border-gray-700 px-1.5 rounded bg-black/30 font-mono">${p.posicao}</span>
                        </div>
                    </td>
                    <td class="text-center py-3 font-black text-xl text-gold bg-gray-800/50 border-x border-gray-800 align-middle">${p.pts}</td>
                    <td class="text-center py-3 text-gray-400 font-bold align-middle">${p.gols}</td>
                    <td class="text-center py-3 text-gray-400 font-bold align-middle">${p.assis}</td>
                    <td class="text-center py-3 text-green-500/80 font-mono hidden sm:table-cell align-middle">${p.vit}</td>
                    <td class="text-center py-3 text-red-500/80 font-mono hidden sm:table-cell align-middle">${p.der}</td>
                </tr>
                `;
            }).join('');
            
            if (sorted.length === 0) {
                document.getElementById('ranking-body').innerHTML = `
                    <tr><td colspan="7" class="text-center py-8 text-gray-500">Nenhum faraó encontrado.</td></tr>
                `;
            } else {
                document.getElementById('ranking-body').innerHTML = html;
            }
        }

        function renderSelection() {
            const getBest = (pos, count, sortFn) => {
                return [...playersData].filter(p => p.posicao === pos).sort(sortFn).slice(0, count);
            };

            const goleiro = getBest('GOL', 1, (a,b) => b.pts - a.pts);
            const zagueiro = getBest('ZAG', 1, (a,b) => b.pts - a.pts || b.gols - a.gols);
            const meias = getBest('MEI', 2, (a,b) => (b.gols + b.assis) - (a.gols + a.assis) || b.pts - a.pts);
            const atacantes = getBest('ATA', 2, (a,b) => (b.gols + b.assis) - (a.gols + a.assis) || b.pts - a.pts);

            const selecao = [...goleiro, ...zagueiro, ...meias, ...atacantes];

            const html = selecao.map(p => `
                <div class="card-panel rounded-lg p-4 flex flex-col items-center justify-center group relative overflow-hidden min-h-[220px]">
                    <div class="absolute inset-0 bg-gold/5 opacity-0 group-hover:opacity-100 transition duration-500"></div>
                    
                    <div class="text-xs font-mono text-gold mb-2 tracking-widest border border-gold/30 px-2 rounded-full bg-black z-10">
                        ${p.posicao}
                    </div>
                    
                    <div class="w-20 h-20 rounded-full border-2 border-gold shadow-[0_0_15px_rgba(255,215,0,0.3)] overflow-hidden mb-2 z-10 bg-gray-900">
                         <img src="${getFoto(p.nome)}" alt="${p.nome}" class="w-full h-full object-cover transition transform group-hover:scale-110 duration-500" onerror="${imgError}">
                    </div>

                    <div class="text-2xl font-bold text-white uppercase font-['Teko'] mb-2 relative z-10">
                        ${p.nome}
                    </div>
                    
                    <div class="flex gap-3 text-sm text-gray-400 z-10 bg-black/40 px-3 py-1 rounded-full border border-gray-800">
                        <div class="flex flex-col items-center">
                            <span class="text-white font-bold leading-none">${p.gols}</span>
                            <span class="text-[8px] leading-none mt-1">GOL</span>
                        </div>
                        <div class="w-px bg-gray-600 h-full"></div>
                        <div class="flex flex-col items-center">
                            <span class="text-white font-bold leading-none">${p.assis}</span>
                            <span class="text-[8px] leading-none mt-1">ASS</span>
                        </div>
                        <div class="w-px bg-gray-600 h-full"></div>
                         <div class="flex flex-col items-center">
                            <span class="text-gold font-bold leading-none">${p.pts}</span>
                            <span class="text-[8px] leading-none mt-1">PTS</span>
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('selection-grid').innerHTML = html;
        }

        document.getElementById('search-input').addEventListener('keyup', (e) => {
            renderTable(e.target.value);
        });

        renderDashboard();
    </script>
</body>
</html>
